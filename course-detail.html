<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <script src="https://js.sentry-cdn.com/66380daacfe58e2b4bc11f2296836b00.min.js" crossorigin="anonymous"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root {
            --page-right: min(8.3vw, 159px);
            --header-h: 60px;
            --sidebar-right-edge: min(21.8vw, 418px);
            --sidebar-gap: min(3.75vw, 72px);
            --signup-right: min(13.44vw, 258px);
        }
        @media (min-width: 1024px) {
            :root { --header-h: 126px; }
        }
        body {
            font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
            background-color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }
        .font-suit { font-family: 'SUIT Variable', 'SUIT', sans-serif; }
        .sidebar-link { transition: color 0.2s ease; }
        .sidebar-link:hover { color: #2F2725 !important; }
        .mobile-menu-overlay { transition: opacity 0.3s ease; }
        .mobile-menu-panel { transition: transform 0.3s ease; }

        .lesson-item {
            transition: all 0.3s ease;
            border-bottom: 1px solid #E5E7EB;
        }
        .lesson-item:hover {
            background-color: #F9FAFB;
        }
        .course-hero-img {
            width: 100%;
            aspect-ratio: 21 / 9;
            object-fit: cover;
            border-radius: 12px;
        }
        .curriculum-scroll {
            max-height: 500px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 0, 0, 0.1) transparent;
            padding-right: 1rem;
        }
        .curriculum-scroll::-webkit-scrollbar { width: 4px; }
        .curriculum-scroll::-webkit-scrollbar-track { background: transparent; }
        .curriculum-scroll::-webkit-scrollbar-thumb { background-color: rgba(0, 0, 0, 0.1); border-radius: 4px; }
    </style>
</head>
<body class="min-h-screen flex flex-col" data-active-page="course-detail">

    <!-- Mobile Header -->
    <header class="lg:hidden fixed top-0 left-0 right-0 bg-white z-50 flex items-center justify-between px-5 h-[60px]">
        <a href="index.html">
            <img src="logo.png" alt="ALLROUND" class="h-[13px] w-auto" style="filter: brightness(0);">
        </a>
        <button id="hamburger-btn" onclick="toggleMobileMenu()">
            <img src="asset/main/햄버거버튼.png" alt="메뉴" class="h-[18px] w-auto">
        </button>
    </header>

    <!-- Desktop Header -->
    <header class="hidden lg:flex fixed top-0 left-0 right-0 bg-white z-50 items-center" style="height: var(--header-h);">
        <div class="flex-shrink-0 flex justify-end" style="width: var(--sidebar-right-edge); padding-right: var(--sidebar-gap);">
            <a href="index.html">
                <img src="logo.png" alt="ALLROUND" class="h-[17px] w-auto" style="filter: brightness(0);">
            </a>
        </div>
        <div class="ml-auto flex items-center" style="padding-right: var(--page-right); gap: 67px;">
            <div id="auth-buttons" class="flex items-center" style="gap: 59px;">
                <a href="auth.html" class="text-[#3E3A39] font-bold text-[20px] leading-[20px] tracking-[-0.2px] hover:opacity-60 transition-opacity">Login</a>
                <a href="auth.html?mode=signup" class="text-[#3E3A39] font-bold text-[20px] leading-[20px] tracking-[-0.2px] hover:opacity-60 transition-opacity">Sign up</a>
            </div>
            <div id="user-menu" class="hidden items-center gap-6">
                <a id="admin-link" href="admin.html" class="text-yellow-600 font-medium text-sm hidden">관리자</a>
                <a href="mypage.html" class="text-[#3E3A39] font-medium text-xl hover:opacity-60 transition-opacity">My Page</a>
                <button onclick="signOut()" class="text-[#9FA0A0] font-medium text-xl hover:opacity-60 transition-opacity">Logout</button>
            </div>
            <button class="flex-shrink-0 hover:opacity-60 transition-opacity">
                <img src="asset/main/햄버거버튼.png" alt="메뉴" class="h-6 w-auto">
            </button>
        </div>
    </header>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="fixed inset-0 z-[60] hidden">
        <div class="mobile-menu-overlay absolute inset-0 bg-black/40" onclick="toggleMobileMenu()"></div>
        <div class="mobile-menu-panel absolute top-0 right-0 w-[280px] h-full bg-white shadow-xl translate-x-full overflow-y-auto">
            <div class="p-6 pt-20">
                <button class="absolute top-5 right-5 text-2xl text-[#2F2725]" onclick="toggleMobileMenu()">&times;</button>
                <nav class="space-y-6">
                    <!-- sidebar.js injects mobile menu -->
                </nav>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 relative" style="padding-top: var(--header-h);">
        <div class="flex h-[calc(100vh-var(--header-h))]">
            <aside class="hidden lg:flex flex-col justify-center flex-shrink-0 bg-white relative z-10" style="width: var(--sidebar-right-edge); padding-right: var(--sidebar-gap);">
                <nav class="text-right space-y-6">
                    <!-- sidebar.js injects desktop sidebar -->
                </nav>
            </aside>

            <!-- 본문 컨텐츠 (스크롤 가능 영역) -->
            <div class="flex-1 relative overflow-y-auto bg-[#F5F5F5] font-suit">

                <!-- 카톡 상담 -->
                <div class="hidden lg:block fixed z-50" style="right: var(--signup-right); top: calc(var(--header-h) + 38px);">
                    <a href="https://pf.kakao.com/_KMbxon" target="_blank" rel="noopener" class="relative inline-block">
                        <img src="asset/main/카톡 배경.png" alt="카톡 상담" class="h-12 md:h-14 w-auto object-contain block">
                        <div class="absolute inset-0 flex items-center justify-end pr-[18%] md:pr-[22%] pointer-events-none">
                            <span class="text-[#2F2725] text-[11px] md:text-[13px] font-bold tracking-wide">카톡 문의</span>
                        </div>
                    </a>
                </div>

                <!-- 뒤로가기 + 타이틀 영역 -->
                <div class="px-6 md:px-12 pt-8 pb-4 text-[#2F2725]">
                    <div class="max-w-[900px] ml-[24px]">
                        <a href="courses.html" class="inline-flex items-center gap-2 text-[14px] text-[#8B95A1] hover:text-[#2F2725] transition-colors mb-4">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                            강의 목록으로
                        </a>
                    </div>
                </div>

                <!-- Course Detail Content -->
                <section id="course-content" class="px-6 md:px-12 pb-20">
                    <div class="max-w-[900px] md:ml-[24px]">
                        <div class="text-center text-gray-400 py-20">
                            강의 정보를 불러오는 중...
                        </div>
                    </div>
                </section>
            </div>
        </div>

        <!-- Mobile: 카톡 플로팅 -->
        <a href="https://pf.kakao.com/_KMbxon" target="_blank" rel="noopener"
           class="lg:hidden fixed bottom-5 right-5 z-40 inline-block">
            <img src="asset/main/카톡 배경.png" alt="카톡 상담" class="h-10 w-auto object-contain drop-shadow-lg block">
            <div class="absolute inset-0 flex items-center justify-end pr-[18%] pointer-events-none">
                <span class="text-[#2F2725] text-[10px] font-bold tracking-wide">카톡 상담</span>
            </div>
        </a>
    </main>

    <div id="footer-container"></div>

    <!-- 커스텀 모달 (리디자인: 흰색 테마) -->
    <div id="custom-modal" class="fixed inset-0 bg-black/40 z-50 hidden flex items-center justify-center p-6">
        <div class="bg-white rounded-2xl w-full max-w-md p-8 space-y-6 shadow-xl">
            <h3 id="modal-title" class="text-xl font-bold text-[#2F2725] text-center"></h3>
            <p id="modal-message" class="text-[#8B95A1] text-center text-[15px] leading-relaxed"></p>
            <div id="modal-buttons" class="flex gap-3">
                <button onclick="closeModal(true)" class="flex-1 px-6 py-4 bg-[#2F2725] text-white font-semibold rounded-2xl text-[15px] hover:bg-[#1a1716] transition-colors">
                    확인
                </button>
            </div>
        </div>
    </div>

    <!-- 토스페이먼츠 결제 모달 (리디자인: 흰색 테마) -->
    <div id="payment-modal" class="fixed inset-0 bg-black/40 z-50 hidden flex items-center justify-center p-4 overflow-y-auto">
        <div class="bg-white rounded-2xl w-full max-w-lg my-8 shadow-xl">
            <!-- 헤더 -->
            <div class="p-6 border-b border-gray-200">
                <div class="flex justify-between items-center">
                    <h3 class="text-xl font-bold text-[#2F2725]">결제하기</h3>
                    <button onclick="closePaymentModal()" class="text-[#8B95A1] hover:text-[#2F2725] transition-colors">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
            </div>
            <!-- 주문 정보 -->
            <div class="p-6 border-b border-gray-100">
                <div class="space-y-4">
                    <div class="flex justify-between text-[13px]">
                        <span class="text-[#8B95A1]">상품명</span>
                        <span id="payment-product-name" class="text-[#2F2725] font-semibold"></span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="text-[13px] text-[#8B95A1]">결제 금액</span>
                        <span id="payment-amount" class="text-[#2F2725] text-xl font-bold"></span>
                    </div>
                </div>
            </div>
            <!-- 결제 수단 선택 영역 -->
            <div class="p-6">
                <div id="payment-method" class="overflow-hidden min-h-[200px]"></div>
            </div>
            <!-- 약관 동의 영역 -->
            <div class="px-6 pb-6">
                <div id="agreement" class="overflow-hidden"></div>
            </div>
            <!-- 결제 버튼 -->
            <div class="p-6 border-t border-gray-200">
                <button id="payment-button" onclick="requestTossPayment()" disabled
                    class="w-full py-4 bg-[#2F2725] text-white font-semibold rounded-2xl text-[15px] hover:bg-[#1a1716] transition-colors disabled:bg-gray-200 disabled:text-gray-400 disabled:cursor-not-allowed">
                    결제하기
                </button>
                <p class="text-[12px] text-[#8B95A1] text-center mt-4">
                    결제 진행 시 이용약관에 동의하는 것으로 간주됩니다.
                </p>
            </div>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/popup-notice.js"></script>
    <script src="js/courses.js"></script>
    <script src="js/progress.js"></script>
    <script>
        function showModal(title, message, callback) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            document.getElementById('custom-modal').classList.remove('hidden');
            if (callback) window.modalCallback = callback;
        }

        function closeModal(confirmed = false) {
            document.getElementById('custom-modal').classList.add('hidden');
            if (confirmed && window.modalCallback) { window.modalCallback(); window.modalCallback = null; }
        }

        function showConfirmModal(title, message, onConfirm) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            document.getElementById('modal-buttons').innerHTML = `
                <button onclick="closeModal(false)" class="flex-1 px-6 py-4 bg-white text-[#2F2725] font-semibold rounded-2xl text-[15px] border border-gray-200 hover:bg-gray-50 transition-colors">취소</button>
                <button onclick="closeModal(true)" class="flex-1 px-6 py-4 bg-[#2F2725] text-white font-semibold rounded-2xl text-[15px] hover:bg-[#1a1716] transition-colors">확인</button>
            `;
            window.modalCallback = onConfirm;
            document.getElementById('custom-modal').classList.remove('hidden');
        }

        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

        let currentCourse = null;
        let hasAccess = false;

        function getCourseId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        function renderLessons(lessons, hasAccess) {
            if (!lessons || lessons.length === 0) return '<p class="text-[#8B95A1] text-center py-8">아직 등록된 레슨이 없습니다.</p>';
            return lessons.map((lesson, index) => {
                const isLocked = !hasAccess;
                return `
                    <div class="lesson-item flex items-center justify-between py-5 px-3 ${isLocked ? 'opacity-40' : ''}">
                        <div class="flex items-baseline space-x-5">
                            <span class="text-[12px] font-medium text-[#8B95A1] font-mono">${String(index + 1).padStart(2, '0')}</span>
                            <div>
                                <h4 class="text-[15px] font-medium text-[#2F2725] mb-1">${lesson.title}</h4>
                                <p class="text-[12px] text-[#8B95A1]">${lesson.duration || 0}분</p>
                            </div>
                        </div>
                        <div>
                            ${isLocked ? `
                                <svg class="w-4 h-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                                </svg>
                            ` : `
                                <a href="lesson.html?id=${lesson.id}" class="text-[13px] text-[#2F2725] hover:text-[#8B95A1] transition-colors font-semibold">
                                    재생
                                </a>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderCourseDetail(course, hasAccess, progress) {
            const totalMinutes = course.totalDuration || 0;
            let totalDurationText = '';
            if (totalMinutes >= 60) {
                const hours = Math.floor(totalMinutes / 60);
                const mins = totalMinutes % 60;
                totalDurationText = mins > 0 ? `${hours}시간 ${mins}분` : `${hours}시간`;
            } else {
                totalDurationText = `${totalMinutes}분`;
            }

            // 수강 기간 텍스트
            const enrollDays = course.enrollment_days || 180;
            const enrollText = enrollDays >= 30 ? `${Math.round(enrollDays / 30)}개월` : `${enrollDays}일`;

            // 업로드 상태 뱃지
            const uploadBadge = course.is_complete === false ? '<span class="inline-block ml-2 px-2 py-0.5 bg-yellow-100 text-yellow-700 text-[10px] font-bold rounded-full">업로드 중</span>' : '';

            const contentDiv = document.getElementById('course-content');
            contentDiv.innerHTML = `
                <div class="max-w-[900px] md:ml-[24px] space-y-10">
                    <!-- Hero Image -->
                    <div class="overflow-hidden rounded-xl">
                        <img src="${course.thumbnail_url || 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1200&q=80'}"
                             class="course-hero-img" alt="${course.title}">
                    </div>

                    <!-- Info Grid -->
                    <div class="grid md:grid-cols-12 gap-8 items-start">
                        <div class="md:col-span-8 space-y-5">
                            <span class="inline-block bg-[#C9A96E] text-white text-[11px] px-3 py-1 rounded font-bold">${course.category || '정규 강의'}</span>
                            <h1 class="text-[28px] md:text-[32px] font-bold text-[#2F2725] leading-tight">${course.title}</h1>
                            <p class="text-[15px] text-[#8B95A1] leading-relaxed max-w-2xl">${course.description || ''}</p>
                            <div class="flex items-center gap-8 text-[13px] text-[#8B95A1] pt-2">
                                <div class="flex flex-col gap-1">
                                    <span class="text-[11px] text-[#C5C5C5]">강의 수</span>
                                    <span class="text-[#2F2725] font-semibold">${course.lessons?.length || 0}강</span>
                                </div>
                                <div class="flex flex-col gap-1">
                                    <span class="text-[11px] text-[#C5C5C5]">총 시간</span>
                                    <span class="text-[#2F2725] font-semibold">${totalDurationText}</span>
                                </div>
                                <div class="flex flex-col gap-1">
                                    <span class="text-[11px] text-[#C5C5C5]">수강 기간</span>
                                    <span class="text-[#2F2725] font-semibold">6개월</span>
                                </div>
                            </div>
                        </div>

                        <div class="md:col-span-4 pt-2">
                            ${hasAccess ? `
                                <div class="p-6 bg-white rounded-2xl border border-gray-200 space-y-5">
                                    <div class="flex justify-between items-end">
                                        <span class="text-[13px] text-[#8B95A1]">수강 진행률</span>
                                        <span class="text-2xl font-bold text-[#2F2725]">${progress?.progress || 0}%</span>
                                    </div>
                                    <div class="w-full h-[4px] bg-gray-100 rounded-full overflow-hidden">
                                        <div class="h-full bg-[#2F2725] rounded-full transition-all duration-1000" style="width: ${progress?.progress || 0}%"></div>
                                    </div>
                                    <p class="text-[13px] text-[#8B95A1] text-center">
                                        ${progress?.completedLessons || 0} / ${progress?.totalLessons || 0} 완료
                                    </p>
                                </div>
                            ` : `
                                <div class="p-6 bg-white rounded-2xl border border-gray-200 space-y-5">
                                    <div class="space-y-4">
                                        <span class="text-[13px] text-[#8B95A1] block">수강료</span>
                                        <div class="space-y-3">
                                            <div class="flex justify-between items-center">
                                                <span class="text-[13px] text-[#8B95A1]">강의비</span>
                                                <span class="text-lg font-bold text-[#2F2725]">\u20A9${(course.price || 0).toLocaleString()}</span>
                                            </div>
                                            <div class="flex justify-between items-center">
                                                <span class="text-[13px] text-[#8B95A1]">교재비</span>
                                                <span class="text-lg font-bold text-[#2F2725]">\u20A9${(course.textbook_price || 0).toLocaleString()}</span>
                                            </div>
                                            <div class="border-t border-gray-100 pt-3 flex justify-between items-center">
                                                <span class="text-[13px] text-[#4E5968] font-semibold">합계</span>
                                                <span class="text-2xl font-bold text-[#2F2725]">\u20A9${((course.price || 0) + (course.textbook_price || 0)).toLocaleString()}</span>
                                            </div>
                                        </div>
                                    </div>
                                    <button onclick="handlePurchase()" class="w-full py-4 bg-[#2F2725] text-white font-semibold rounded-2xl text-[15px] hover:bg-[#1a1716] transition-colors">
                                        ${((course.price || 0) + (course.textbook_price || 0)) === 0 ? '무료 수강 시작' : '수강 신청'}
                                    </button>
                                    <p class="text-[12px] text-[#C5C5C5] text-center leading-relaxed">
                                        구매일로부터 6개월 무제한 수강
                                    </p>
                                </div>
                            `}
                        </div>
                    </div>

                    <!-- Curriculum -->
                    <div class="bg-white rounded-2xl border border-gray-200 p-6 md:p-8 space-y-6">
                        <h2 class="text-[16px] font-bold text-[#2F2725] border-b border-gray-100 pb-4">커리큘럼</h2>
                        <div class="curriculum-scroll divide-y divide-gray-100">
                            ${renderLessons(course.lessons, hasAccess)}
                        </div>
                    </div>

                    ${course.long_description ? `
                        <div class="bg-white rounded-2xl border border-gray-200 p-6 md:p-8 space-y-6">
                            <h2 class="text-[16px] font-bold text-[#2F2725] border-b border-gray-100 pb-4">강의 소개</h2>
                            <div class="prose max-w-none text-[#4E5968] leading-relaxed text-[15px]">
                                ${typeof course.long_description === 'string' ? course.long_description : ''}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
            document.title = `${course.title} — ALLROUND`;
        }

        async function handlePurchase() {
            const user = await getCurrentUser();
            if (!user) {
                showModal('로그인 필요', '로그인 후 수강 신청이 가능합니다.', () => {
                    window.location.href = 'auth.html?redirect=' + encodeURIComponent(window.location.href);
                });
                return;
            }

            const totalPrice = (currentCourse.price || 0) + (currentCourse.textbook_price || 0);

            if (totalPrice === 0) {
                await handleFreePurchase(user);
                return;
            }

            window.location.href = `payment.html?courseId=${currentCourse.id}`;
        }

        async function handleFreePurchase(user) {
            try {
                const orderId = `free-${Date.now()}-${Math.random().toString(36).substring(2, 9)}`;

                const { error: orderError } = await window.supabase
                    .from('orders')
                    .insert({
                        id: orderId,
                        user_id: user.id,
                        course_id: currentCourse.id,
                        amount: 0,
                        order_name: `${currentCourse.title} (무료)`,
                        customer_name: user.email?.split('@')[0] || '',
                        customer_email: user.email || '',
                        status: 'DONE',
                        payment_type: 'course',
                        shipping_status: 'NO_SHIPPING'
                    });

                if (orderError) throw orderError;

                const { error: purchaseError } = await window.supabase
                    .from('purchases')
                    .insert({
                        user_id: user.id,
                        course_id: currentCourse.id,
                        order_id: orderId,
                        status: 'completed',
                        payment_method: 'free',
                        amount: 0,
                        purchased_at: new Date().toISOString()
                    });

                if (purchaseError && purchaseError.code !== '23505') throw purchaseError;

                showModal('수강 신청 완료', '무료 강의가 등록되었습니다. 바로 수강하실 수 있습니다.', () => {
                    window.location.reload();
                });
            } catch (error) {
                console.error('Free purchase error:', error);
                showModal('오류', '수강 신청 중 오류가 발생했습니다. 다시 시도해주세요.');
            }
        }

        async function loadCourseDetail() {
            const courseId = getCourseId();
            if (!courseId) { window.location.href = 'courses.html'; return; }

            const courseResult = await getCourseById(courseId);
            if (!courseResult.success) {
                document.getElementById('course-content').innerHTML = `<div class="max-w-[900px] md:ml-[24px] text-center text-[#8B95A1] py-20"><p class="text-xl mb-4 text-[#2F2725]">강의를 찾을 수 없습니다.</p><a href="courses.html" class="text-[#2F2725] underline">강의 목록으로 돌아가기</a></div>`;
                return;
            }

            currentCourse = courseResult.data;
            const visibility = currentCourse.visibility || 'public';
            const user = await getCurrentUser();

            const userIsAdmin = user ? await isAdmin() : false;
            if (visibility === 'private' && !userIsAdmin) {
                if (!user) {
                    alert('이 강의는 비공개 강의입니다. 로그인이 필요합니다.');
                    window.location.href = 'auth.html';
                    return;
                }

                const { data: permission, error: permError } = await window.supabase
                    .from('course_access_permissions')
                    .select('id')
                    .eq('course_id', courseId)
                    .eq('user_id', user.id)
                    .single();

                if (permError || !permission) {
                    document.getElementById('course-content').innerHTML = `
                        <div class="max-w-[900px] md:ml-[24px] text-center py-20">
                            <div class="mb-6">
                                <svg class="w-12 h-12 mx-auto text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                                </svg>
                            </div>
                            <p class="text-2xl mb-4 text-[#2F2725] font-bold">비공개 강의입니다</p>
                            <p class="text-[15px] text-[#8B95A1] mb-6">이 강의는 관리자가 승인한 사용자만 접근할 수 있습니다.</p>
                            <p class="text-[13px] text-[#C5C5C5] mb-8">접근 권한이 필요하시다면 관리자에게 문의해주세요.</p>
                            <a href="courses.html" class="inline-block px-6 py-3 bg-[#2F2725] text-white rounded-2xl hover:bg-[#1a1716] transition-colors font-semibold">
                                강의 목록으로 돌아가기
                            </a>
                        </div>
                    `;
                    return;
                }
            }

            let progress = null;
            if (user) {
                const accessResult = await hasAccessToCourse(user.id, courseId);
                hasAccess = accessResult.hasAccess;
                if (hasAccess) {
                    const progressResult = await getCourseProgress(user.id, courseId);
                    progress = progressResult.data;
                }
            }

            renderCourseDetail(currentCourse, hasAccess, progress);

            // 결제 미완료 안내 모달 체크
            if (user && hasAccess) {
                checkPaymentNotice(user.id, courseId);
            }
        }

        async function checkPaymentNotice(userId, courseId) {
            try {
                // NEEDS_PAYMENT 상태 주문이 있는지 확인
                const { data: needsPayment } = await window.supabase
                    .from('orders')
                    .select('id, order_name, amount')
                    .eq('user_id', userId)
                    .eq('course_id', courseId)
                    .eq('status', 'NEEDS_PAYMENT')
                    .limit(1);

                if (!needsPayment || needsPayment.length === 0) return;

                // 이미 정상 결제된 DONE 주문이 있으면 모달 안 띄움
                const { data: doneOrders } = await window.supabase
                    .from('orders')
                    .select('id')
                    .eq('user_id', userId)
                    .eq('course_id', courseId)
                    .eq('status', 'DONE')
                    .limit(1);

                if (doneOrders && doneOrders.length > 0) return;

                // 모달 표시
                const order = needsPayment[0];
                showPaymentNoticeModal(order, courseId);
            } catch (e) {
                console.error('결제 안내 체크 오류:', e);
            }
        }

        function showPaymentNoticeModal(order, courseId) {
            const overlay = document.createElement('div');
            overlay.id = 'payment-notice-overlay';
            overlay.className = 'fixed inset-0 bg-black/50 z-50 flex items-center justify-center px-5';
            overlay.innerHTML = `
                <div class="bg-white rounded-2xl max-w-[360px] w-full overflow-hidden shadow-xl">
                    <div class="bg-[#2F2725] px-6 py-5 text-center">
                        <svg class="w-10 h-10 mx-auto mb-2" viewBox="0 0 24 24" fill="none" stroke="#F5F5F5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/>
                            <line x1="12" y1="8" x2="12" y2="12"/>
                            <line x1="12" y1="16" x2="12.01" y2="16"/>
                        </svg>
                        <h2 class="text-white text-[18px] font-bold">결제 확인이 필요합니다</h2>
                    </div>
                    <div class="px-6 py-6 space-y-4">
                        <p class="text-[#2F2725] text-[15px] leading-relaxed text-center">
                            수강 중인 강의의 결제가 아직 완료되지 않았습니다.<br>
                            아래 버튼을 눌러 결제를 진행해주세요.
                        </p>
                        <div class="bg-gray-50 rounded-xl p-4 space-y-2">
                            <div class="flex justify-between text-sm">
                                <span class="text-[#8B95A1]">강의명</span>
                                <span class="text-[#2F2725] font-semibold">${order.order_name.replace(' (강의비)', '')}</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-[#8B95A1]">결제 금액</span>
                                <span class="text-[#2F2725] font-bold">\u20A9${(order.amount || 0).toLocaleString()}</span>
                            </div>
                        </div>
                        <p class="text-[#8B95A1] text-xs text-center">결제 전까지 수강은 계속 가능합니다.</p>
                    </div>
                    <div class="px-6 pb-6 space-y-3">
                        <a href="payment.html?courseId=${courseId}" class="block w-full py-4 bg-[#2F2725] text-white font-semibold rounded-2xl text-[15px] text-center hover:bg-[#1a1817] transition-colors">결제하기</a>
                        <button onclick="document.getElementById('payment-notice-overlay').remove()" class="w-full py-3 text-[#8B95A1] text-sm hover:text-[#2F2725] transition-colors">나중에 할게요</button>
                    </div>
                </div>
            `;
            document.body.appendChild(overlay);
        }

        document.addEventListener('DOMContentLoaded', loadCourseDetail);
    </script>
    <script src="js/sidebar.js"></script>
    <script src="js/footer.js"></script>
    <script>
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            const panel = menu.querySelector('.mobile-menu-panel');
            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                requestAnimationFrame(() => {
                    panel.classList.remove('translate-x-full');
                    panel.classList.add('translate-x-0');
                });
                document.body.style.overflow = 'hidden';
            } else {
                panel.classList.remove('translate-x-0');
                panel.classList.add('translate-x-full');
                setTimeout(() => { menu.classList.add('hidden'); }, 300);
                document.body.style.overflow = '';
            }
        }
    </script>
</body>
</html>
