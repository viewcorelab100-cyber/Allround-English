    <script>
        function showModal(title, message, callback) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            document.getElementById('custom-modal').classList.remove('hidden');
            if (callback) window.modalCallback = callback;
        }

        function closeModal(confirmed = false) {
            document.getElementById('custom-modal').classList.add('hidden');
            if (confirmed && window.modalCallback) { window.modalCallback(); window.modalCallback = null; }
        }

        function showConfirmModal(title, message, onConfirm) {
            document.getElementById('modal-title').textContent = title;
            document.getElementById('modal-message').textContent = message;
            document.getElementById('modal-buttons').innerHTML = `
                <button onclick="closeModal(false)" class="flex-1 px-8 py-4 bg-transparent text-white font-bold uppercase tracking-widest text-xs border border-white border-opacity-20 hover:border-opacity-100 transition-colors">Cancel</button>
                <button onclick="closeModal(true)" class="flex-1 px-8 py-4 bg-white text-black font-bold uppercase tracking-widest text-xs">Confirm</button>
            `;
            window.modalCallback = onConfirm;
            document.getElementById('custom-modal').classList.remove('hidden');
        }

        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });
    
        let currentCourse = null;
        let hasAccess = false;

        function getCourseId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('id');
        }

        function renderLessons(lessons, hasAccess) {
            if (!lessons || lessons.length === 0) return '<p class="text-gray-500 text-center py-8">아직 등록된 레슨이 없습니다.</p>';
            return lessons.map((lesson, index) => {
                const isLocked = !hasAccess;
                return `
                    <div class="lesson-item flex items-center justify-between py-6 px-2 ${isLocked ? 'opacity-40' : ''}">
                        <div class="flex items-baseline space-x-6">
                            <span class="text-[10px] font-medium text-gray-600 font-mono">${String(index + 1).padStart(2, '0')}</span>
                            <div>
                                <h4 class="text-base font-medium text-white mb-1">${lesson.title}</h4>
                                <p class="text-[10px] text-gray-600 uppercase tracking-widest">${lesson.duration || 0} Minutes</p>
                            </div>
                        </div>
                        <div>
                            ${isLocked ? `
                                <svg class="w-4 h-4 text-gray-700" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                                </svg>
                            ` : `
                                <a href="lesson.html?id=${lesson.id}" class="text-[10px] uppercase tracking-[0.2em] text-white hover:text-gray-400 transition-colors font-semibold">
                                    Play
                                </a>
                            `}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function renderCourseDetail(course, hasAccess, progress) {
            // 총 시간 포맷팅
            const totalMinutes = course.totalDuration || 0;
            let totalDurationText = '';
            if (totalMinutes >= 60) {
                const hours = Math.floor(totalMinutes / 60);
                const mins = totalMinutes % 60;
                totalDurationText = mins > 0 ? `${hours}H ${mins}M` : `${hours}H`;
            } else {
                totalDurationText = `${totalMinutes}M`;
            }
            
            const contentDiv = document.getElementById('course-content');
            contentDiv.innerHTML = `
                <div class="max-w-6xl mx-auto space-y-16">
                    <!-- Hero Section -->
                    <div class="space-y-10">
                        <div class="overflow-hidden">
                            <img src="${course.thumbnail_url || 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=1200&q=80'}" 
                                 class="course-hero-img" alt="${course.title}">
                        </div>
                        
                        <div class="grid md:grid-cols-12 gap-10 items-start">
                            <div class="md:col-span-8 space-y-6">
                                <span class="text-[10px] uppercase tracking-[0.2em] text-gray-500 font-medium">${course.category || 'General'}</span>
                                <h1 class="text-4xl md:text-6xl font-bold text-white leading-tight">${course.title}</h1>
                                <p class="text-lg text-gray-400 font-light leading-relaxed max-w-2xl">${course.description || ''}</p>
                                <div class="flex items-center space-x-8 text-[11px] uppercase tracking-widest text-gray-500 pt-4">
                                    <div class="flex flex-col gap-1">
                                        <span class="text-gray-600">Lessons</span>
                                        <span class="text-white">${course.lessons?.length || 0} Modules</span>
                                    </div>
                                    <div class="flex flex-col gap-1">
                                        <span class="text-gray-600">Duration</span>
                                        <span class="text-white">${totalDurationText}</span>
                                    </div>
                                    <div class="flex flex-col gap-1">
                                        <span class="text-gray-600">Access</span>
                                        <span class="text-white">6 Months</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="md:col-span-4 pt-4">
                                ${hasAccess ? `
                                    <div class="p-8 border border-white/10 space-y-6">
                                        <div class="flex justify-between items-end">
                                            <span class="text-[10px] uppercase tracking-widest text-gray-500">Progress</span>
                                            <span class="text-2xl font-bold text-white">${progress?.progress || 0}%</span>
                                        </div>
                                        <div class="w-full h-[2px] bg-white/10 overflow-hidden">
                                            <div class="h-full bg-white transition-all duration-1000" style="width: ${progress?.progress || 0}%"></div>
                                        </div>
                                        <p class="text-[11px] text-gray-500 text-center uppercase tracking-widest">
                                            ${progress?.completedLessons || 0} / ${progress?.totalLessons || 0} Completed
                                        </p>
                                    </div>
                                ` : `
                                    <div class="p-8 border border-white/10 space-y-6">
                                        <div class="space-y-4">
                                            <span class="text-[10px] uppercase tracking-widest text-gray-500 block">Investment</span>
                                            <div class="space-y-3">
                                                <div class="flex justify-between items-center">
                                                    <span class="text-[10px] uppercase tracking-widest text-gray-500">Course</span>
                                                    <span class="text-xl font-bold text-white">₩${(course.price || 0).toLocaleString()}</span>
                                                </div>
                                                <div class="flex justify-between items-center">
                                                    <span class="text-[10px] uppercase tracking-widest text-gray-500">Textbook</span>
                                                    <span class="text-xl font-bold text-white">₩${(course.textbook_price || 0).toLocaleString()}</span>
                                                </div>
                                                <div class="border-t border-white/10 pt-3 flex justify-between items-center">
                                                    <span class="text-[10px] uppercase tracking-widest text-gray-300">Total</span>
                                                    <span class="text-2xl font-bold text-white">₩${((course.price || 0) + (course.textbook_price || 0)).toLocaleString()}</span>
                                                </div>
                                            </div>
                                        </div>
                                        <button onclick="handlePurchase()" class="btn-primary w-full">
                                            Enroll Now
                                        </button>
                                        <p class="text-[10px] text-gray-600 text-center leading-relaxed uppercase tracking-wider">
                                            6 months unlimited access<br>from date of purchase
                                        </p>
                                    </div>
                                `}
                            </div>
                        </div>
                    </div>

                    <!-- Content -->
                    <div class="grid md:grid-cols-12 gap-16">
                        <div class="md:col-span-8 space-y-12">
                            <div class="space-y-8">
                                <h2 class="text-xs uppercase tracking-[0.3em] text-gray-500 font-bold border-b border-white/10 pb-4">Curriculum</h2>
                                <div class="curriculum-scroll divide-y divide-white/5">
                                    ${renderLessons(course.lessons, hasAccess)}
                                </div>
                            </div>
                            
                            ${course.long_description ? `
                                <div class="space-y-8">
                                    <h2 class="text-xs uppercase tracking-[0.3em] text-gray-500 font-bold border-b border-white/10 pb-4">Overview</h2>
                                    <div class="prose prose-invert max-w-none text-gray-400 font-light leading-relaxed">
                                        ${typeof course.long_description === 'string' ? course.long_description : ''}
                                    </div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                </div>
            `;
            document.title = `${course.title} — ALLROUND`;
        }

        async function handlePurchase() {
            const user = await getCurrentUser();
            if (!user) { 
                showModal('로그인 필요', '로그인이 필요한 서비스입니다.', () => { 
                    window.location.href = 'auth.html?redirect=' + encodeURIComponent(window.location.href); 
                }); 
                return; 
            }
            // 토스페이먼츠 결제 페이지로 이동 (주문 생성은 payment.js에서 처리)
            window.location.href = `payment.html?courseId=${currentCourse.id}`;
        }

        async function loadCourseDetail() {
            const courseId = getCourseId();
            if (!courseId) { window.location.href = 'courses.html'; return; }
            
            const courseResult = await getCourseById(courseId);
            if (!courseResult.success) { 
                document.getElementById('course-content').innerHTML = `<div class="text-center text-gray-500 py-20"><p class="text-xl mb-4">강의를 찾을 수 없습니다.</p><a href="courses.html" class="text-white underline">강의 목록으로 돌아가기</a></div>`; 
                return; 
            }
            
            currentCourse = courseResult.data;
            const visibility = currentCourse.visibility || 'public';
            const user = await getCurrentUser();
            
            // 비공개 강의 접근 권한 체크 (관리자는 우회)
            const userIsAdmin = user ? await isAdmin() : false;
            if (visibility === 'private' && !userIsAdmin) {
                if (!user) {
                    alert('이 강의는 비공개 강의입니다. 로그인이 필요합니다.');
                    window.location.href = 'auth.html';
                    return;
                }

                const { data: permission, error: permError } = await window.supabase
                    .from('course_access_permissions')
                    .select('id')
                    .eq('course_id', courseId)
                    .eq('user_id', user.id)
                    .single();

                if (permError || !permission) {
                    document.getElementById('course-content').innerHTML = `
                        <div class="text-center text-gray-500 py-20">
                            <div class="mb-6">
                                <svg class="w-12 h-12 mx-auto text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                                </svg>
                            </div>
                            <p class="text-2xl mb-4 text-white">비공개 강의입니다</p>
                            <p class="text-lg mb-6">이 강의는 관리자가 승인한 사용자만 접근할 수 있습니다.</p>
                            <p class="text-sm mb-8">접근 권한이 필요하시다면 관리자에게 문의해주세요.</p>
                            <a href="courses.html" class="inline-block px-6 py-3 bg-white text-black rounded-lg hover:bg-gray-200 transition">
                                강의 목록으로 돌아가기
                            </a>
                        </div>
                    `;
                    return;
                }
            }
            
            let progress = null;
            if (user) {
                const accessResult = await hasAccessToCourse(user.id, courseId);
                hasAccess = accessResult.hasAccess;
                if (hasAccess) { 
                    const progressResult = await getCourseProgress(user.id, courseId); 
                    progress = progressResult.data; 
                }
            }
            
            renderCourseDetail(currentCourse, hasAccess, progress);
        }

        document.addEventListener('DOMContentLoaded', loadCourseDetail);
    </script>
    
    <!-- 모바일 메뉴 토글 스크립트 -->
    <script>
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        
        if (mobileMenuBtn && mobileMenu) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
                
                // 햄버거 메뉴 아이콘 애니메이션
                const spans = mobileMenuBtn.querySelectorAll('span');
                if (!mobileMenu.classList.contains('hidden')) {
                    spans[0].style.transform = 'rotate(45deg) translateY(6px)';
                    spans[1].style.opacity = '0';
                    spans[2].style.transform = 'rotate(-45deg) translateY(-6px)';
                } else {
                    spans[0].style.transform = 'none';
                    spans[1].style.opacity = '1';
                    spans[2].style.transform = 'none';
                }
            });
            
            // 모바일 메뉴 링크 클릭시 메뉴 닫기
            const mobileMenuLinks = mobileMenu.querySelectorAll('a');
            mobileMenuLinks.forEach(link => {
                link.addEventListener('click', () => {
                    mobileMenu.classList.add('hidden');
                    const spans = mobileMenuBtn.querySelectorAll('span');
                    spans[0].style.transform = 'none';
                    spans[1].style.opacity = '1';
                    spans[2].style.transform = 'none';
                });
            });
        }
    </script>
    <script src="js/footer.js"></script>
</body>
</html>
