<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 안내 모달 미리보기</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Pretendard Variable', sans-serif; background: #F5F5F5; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">

    <!-- 배경 (강의 페이지 시뮬레이션) -->
    <div class="text-center text-[#8B95A1] text-lg">강의 상세 페이지 배경</div>

    <!-- 모달 오버레이 -->
    <div id="payment-notice-overlay" class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center px-5">
        <div class="bg-white rounded-2xl max-w-[360px] w-full overflow-hidden shadow-xl">
            <!-- 헤더 -->
            <div class="bg-[#2F2725] px-6 py-5 text-center">
                <svg class="w-10 h-10 mx-auto mb-2" viewBox="0 0 24 24" fill="none" stroke="#F5F5F5" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/>
                    <line x1="12" y1="8" x2="12" y2="12"/>
                    <line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <h2 class="text-white text-[18px] font-bold">결제 확인이 필요합니다</h2>
            </div>

            <!-- 내용 -->
            <div class="px-6 py-6 space-y-4">
                <p class="text-[#2F2725] text-[15px] leading-relaxed text-center">
                    수강 중인 강의의 결제가 아직 완료되지 않았습니다.<br>
                    아래 버튼을 눌러 결제를 진행해주세요.
                </p>

                <!-- 강의 정보 -->
                <div class="bg-gray-50 rounded-xl p-4 space-y-2">
                    <div class="flex justify-between text-sm">
                        <span class="text-[#8B95A1]">강의명</span>
                        <span class="text-[#2F2725] font-semibold">[4월] FIRSTEE CLASS</span>
                    </div>
                    <div class="flex justify-between text-sm">
                        <span class="text-[#8B95A1]">결제 금액</span>
                        <span class="text-[#2F2725] font-bold">₩15,000</span>
                    </div>
                </div>

                <p class="text-[#8B95A1] text-xs text-center">
                    결제 전까지 수강은 계속 가능합니다.
                </p>
            </div>

            <!-- 버튼 -->
            <div class="px-6 pb-6 space-y-3">
                <button onclick="alert('결제 페이지로 이동합니다')"
                    class="w-full py-4 bg-[#2F2725] text-white font-semibold rounded-2xl hover:bg-[#1a1817] transition-colors text-[16px]">
                    결제하기
                </button>
                <button onclick="document.getElementById('payment-notice-overlay').classList.add('hidden')"
                    class="w-full py-3 text-[#8B95A1] text-sm hover:text-[#2F2725] transition-colors">
                    나중에 할게요
                </button>
            </div>
        </div>
    </div>

</body>
</html>
