<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>결제 실패 — ALLROUND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>tailwind.config = { corePlugins: { container: false } }</script>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
            margin: 0;
            background: #F5F5F5;
        }
    </style>
</head>
<body>
    <div class="min-h-screen flex flex-col">
        <header class="bg-white border-b border-gray-200">
            <div class="max-w-2xl mx-auto px-6 py-4">
                <a href="./index.html">
                    <img src="./img/logo.png" alt="ALLROUND" style="height:28px;">
                </a>
            </div>
        </header>

        <main class="flex-1">
            <div class="max-w-2xl mx-auto px-6 py-10">
                <div class="text-center py-16 space-y-6">
                    <svg class="w-20 h-20 mx-auto text-red-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                    <div class="space-y-2">
                        <h1 class="text-[28px] font-bold text-[#2F2725]">결제에 실패했습니다</h1>
                        <p id="fail-message" class="text-[#8B95A1]">-</p>
                        <p id="fail-code" class="text-xs text-[#C5C5C5]"></p>
                    </div>
                    <a id="retry-link" href="#"
                        class="inline-block px-8 py-3 bg-[#2F2725] text-white font-semibold rounded-xl hover:bg-[#1a1716] transition-colors">
                        다시 시도하기
                    </a>
                    <p class="text-xs text-[#8B95A1]">문의: 0507-1339-3828</p>
                </div>
            </div>
        </main>

        <footer class="bg-white border-t border-gray-200 py-6">
            <div class="max-w-2xl mx-auto px-6 text-center text-xs text-[#8B95A1] space-y-1">
                <p><strong>올라운드원격학원</strong></p>
                <p>사업자등록번호: 560-94-02154 | 대표: 배은영</p>
                <p>고객센터: 0507-1339-3828</p>
            </div>
        </footer>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var params = new URLSearchParams(location.search);
            var token = params.get('token');
            var code = params.get('code');
            var message = params.get('message');

            document.getElementById('fail-message').textContent = message || '결제가 정상적으로 처리되지 않았습니다.';
            if (code) {
                document.getElementById('fail-code').textContent = '오류 코드: ' + code;
            }

            if (token) {
                document.getElementById('retry-link').href = 'payment-link.html?token=' + token;
            } else {
                document.getElementById('retry-link').style.display = 'none';
            }
        });
    </script>
</body>
</html>
