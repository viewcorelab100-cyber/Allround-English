<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>로그인 처리 중 — ALLROUND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
    <style>
        body {
            font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
            background-color: #F5F5F5;
            margin: 0;
        }
        input, textarea, select { border-radius: 0px !important; }
        .btn-primary {
            background-color: #13372A;
            color: white;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-primary:hover { background-color: #1a4a38; }
        .radio-card { transition: all 0.2s ease; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center px-4">

    <!-- 로딩 상태 -->
    <div id="loading-state" class="text-center">
        <div class="w-8 h-8 border-2 border-[#13372A] border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
        <p class="text-[13px] text-[#9FA0A0] tracking-wide">로그인 처리 중...</p>
    </div>

    <!-- 에러 상태 -->
    <div id="error-state" class="hidden text-center max-w-md">
        <p class="text-[13px] text-red-500 mb-4" id="error-message"></p>
        <a href="auth.html" class="text-[11px] text-[#9FA0A0] uppercase tracking-widest hover:text-[#2F2725] transition-colors">&larr; 로그인 페이지로 돌아가기</a>
    </div>

    <!-- 추가정보 입력 폼 (최초 네이버 로그인 시) -->
    <div id="additional-info" class="hidden w-full max-w-md bg-white p-8 md:p-10 shadow-sm">
        <h2 class="text-[14px] font-bold text-[#2F2725] uppercase tracking-[0.2em] mb-2">추가 정보 입력</h2>
        <p class="text-[10px] text-[#9FA0A0] tracking-wide mb-8">서비스 이용을 위해 아래 정보를 입력해주세요.</p>

        <div class="space-y-8">
            <!-- 학생 정보 -->
            <div class="space-y-6">
                <span class="text-[10px] text-[#9FA0A0] uppercase tracking-[0.2em] font-bold block border-b border-gray-200 pb-2">학생 정보</span>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-semibold text-[#9FA0A0] mb-2 uppercase tracking-widest">Name <span class="text-red-500">*</span></label>
                        <input type="text" id="info-name"
                               class="w-full px-4 py-3 bg-white border border-gray-300 text-[#2F2725] placeholder-gray-400 focus:outline-none focus:border-[#2F2725] transition-colors"
                               placeholder="학생 이름">
                    </div>
                    <div>
                        <label class="block text-[10px] font-semibold text-[#9FA0A0] mb-2 uppercase tracking-widest">Phone <span class="text-red-500">*</span></label>
                        <input type="tel" id="info-phone"
                               class="w-full px-4 py-3 bg-white border border-gray-300 text-[#2F2725] placeholder-gray-400 focus:outline-none focus:border-[#2F2725] transition-colors"
                               placeholder="010-0000-0000"
                               oninput="formatPhoneNumber(this)"
                               maxlength="13">
                    </div>
                    <div>
                        <label class="block text-[10px] font-semibold text-[#9FA0A0] mb-2 uppercase tracking-widest">Address <span class="text-red-500">*</span></label>
                        <div class="flex gap-2 mb-2">
                            <input type="text" id="info-postcode"
                                   class="w-28 px-4 py-3 bg-white border border-gray-300 text-[#2F2725] placeholder-gray-400"
                                   placeholder="Zip" readonly>
                            <button type="button" onclick="openPostcode()"
                                    class="px-6 py-3 bg-[#F5F5F5] text-[#2F2725] text-[10px] uppercase tracking-widest font-bold hover:bg-gray-200 transition-all border border-gray-300">
                                Search
                            </button>
                        </div>
                        <input type="text" id="info-address"
                               class="w-full px-4 py-3 bg-white border border-gray-300 text-[#2F2725] placeholder-gray-400 mb-2"
                               placeholder="기본 주소" readonly>
                        <input type="text" id="info-address-detail"
                               class="w-full px-4 py-3 bg-white border border-gray-300 text-[#2F2725] placeholder-gray-400 focus:outline-none focus:border-[#2F2725] transition-colors"
                               placeholder="상세 주소">
                        <p class="text-[9px] text-[#9FA0A0] tracking-tight mt-2">※ 교재는 이 주소로 배송됩니다.</p>
                    </div>
                </div>
            </div>

            <!-- 보호자 정보 -->
            <div class="space-y-6">
                <span class="text-[10px] text-[#9FA0A0] uppercase tracking-[0.2em] font-bold block border-b border-gray-200 pb-2">보호자 정보</span>
                <div class="space-y-4">
                    <div>
                        <label class="block text-[10px] font-semibold text-[#9FA0A0] mb-2 uppercase tracking-widest">Guardian Name <span class="text-red-500">*</span></label>
                        <input type="text" id="info-guardian-name"
                               class="w-full px-4 py-3 bg-white border border-gray-300 text-[#2F2725] placeholder-gray-400 focus:outline-none focus:border-[#2F2725] transition-colors"
                               placeholder="보호자 이름">
                    </div>
                    <div>
                        <label class="block text-[10px] font-semibold text-[#9FA0A0] mb-2 uppercase tracking-widest">Guardian Phone <span class="text-red-500">*</span></label>
                        <input type="tel" id="info-guardian-phone"
                               class="w-full px-4 py-3 bg-white border border-gray-300 text-[#2F2725] placeholder-gray-400 focus:outline-none focus:border-[#2F2725] transition-colors"
                               placeholder="010-0000-0000"
                               oninput="formatPhoneNumber(this)"
                               maxlength="13">
                        <p class="text-[9px] text-[#9FA0A0] tracking-tight mt-2">※ 알림톡이 이 번호로 발송됩니다.</p>
                    </div>
                </div>
            </div>

            <!-- 수강 유형 -->
            <div class="space-y-6">
                <span class="text-[10px] text-[#9FA0A0] uppercase tracking-[0.2em] font-bold block border-b border-gray-200 pb-2">수강 유형 <span class="text-red-500">*</span></span>
                <div class="grid grid-cols-2 gap-3">
                    <label class="relative cursor-pointer">
                        <input type="radio" name="student-type" value="online" checked class="peer sr-only">
                        <div class="radio-card px-4 py-4 border border-gray-300 bg-white text-center peer-checked:border-[#2F2725] peer-checked:bg-gray-50 transition-all">
                            <span class="text-[10px] text-[#2F2725] font-bold uppercase tracking-widest">Online</span>
                            <p class="text-[9px] text-[#9FA0A0] tracking-tight mt-1">비대면 수업</p>
                        </div>
                    </label>
                    <label class="relative cursor-pointer">
                        <input type="radio" name="student-type" value="offline" class="peer sr-only">
                        <div class="radio-card px-4 py-4 border border-gray-300 bg-white text-center peer-checked:border-[#2F2725] peer-checked:bg-gray-50 transition-all">
                            <span class="text-[10px] text-[#2F2725] font-bold uppercase tracking-widest">Offline</span>
                            <p class="text-[9px] text-[#9FA0A0] tracking-tight mt-1">대면 수업</p>
                        </div>
                    </label>
                </div>
            </div>

            <div id="info-error" class="text-red-500 text-[10px] uppercase tracking-wider hidden"></div>
            <button onclick="submitAdditionalInfo()"
                    class="w-full px-8 py-4 btn-primary text-xs uppercase tracking-[0.2em]">
                가입 완료
            </button>
        </div>
    </div>

    <script src="js/supabase-config.js"></script>
    <script>
        function formatPhoneNumber(input) {
            let value = input.value.replace(/[^0-9]/g, '');
            if (value.length > 3 && value.length <= 7) {
                value = value.slice(0, 3) + '-' + value.slice(3);
            } else if (value.length > 7) {
                value = value.slice(0, 3) + '-' + value.slice(3, 7) + '-' + value.slice(7, 11);
            }
            input.value = value;
        }

        function openPostcode() {
            new daum.Postcode({
                oncomplete: function(data) {
                    document.getElementById('info-postcode').value = data.zonecode;
                    document.getElementById('info-address').value = data.address;
                    document.getElementById('info-address-detail').focus();
                }
            }).open();
        }

        function showError(msg) {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('error-state').classList.remove('hidden');
            document.getElementById('error-message').textContent = msg;
        }

        function showAdditionalInfoForm(userName) {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('additional-info').classList.remove('hidden');
            if (userName) {
                document.getElementById('info-name').value = userName;
            }
        }

        async function submitAdditionalInfo() {
            const errorDiv = document.getElementById('info-error');
            errorDiv.classList.add('hidden');

            const name = document.getElementById('info-name').value.trim();
            const phone = document.getElementById('info-phone').value.trim();
            const postcode = document.getElementById('info-postcode').value.trim();
            const address = document.getElementById('info-address').value.trim();
            const addressDetail = document.getElementById('info-address-detail').value.trim();
            const guardianName = document.getElementById('info-guardian-name').value.trim();
            const guardianPhone = document.getElementById('info-guardian-phone').value.trim();
            const studentType = document.querySelector('input[name="student-type"]:checked')?.value;

            if (!name || !phone || !postcode || !address || !guardianName || !guardianPhone) {
                errorDiv.textContent = '모든 필수 항목을 입력해주세요.';
                errorDiv.classList.remove('hidden');
                return;
            }

            const { data: { user } } = await window.supabase.auth.getUser();
            if (!user) {
                showError('세션이 만료되었습니다. 다시 로그인해주세요.');
                return;
            }

            const { error } = await window.supabase
                .from('profiles')
                .update({
                    name,
                    phone,
                    postcode,
                    address,
                    address_detail: addressDetail,
                    guardian_name: guardianName,
                    guardian_phone: guardianPhone,
                    student_type: studentType,
                    status: 'pending',
                })
                .eq('id', user.id);

            if (error) {
                errorDiv.textContent = '저장 실패: ' + error.message;
                errorDiv.classList.remove('hidden');
                return;
            }

            // 가입 완료 → 메인 페이지로
            window.location.href = 'index.html';
        }

        // 페이지 로드 시 — naver_code로 세션 생성 or 기존 세션 확인
        async function init() {
            const params = new URLSearchParams(window.location.search);
            const naverCode = params.get('naver_code');

            // Edge Function에서 전달받은 naver_code로 token_hash 조회 → 세션 생성
            if (naverCode) {
                try {
                    console.log('[네이버 로그인] naver_code:', naverCode);

                    // Edge Function POST로 token_hash 조회
                    const res = await fetch('https://fqxbfetyfjyzomgrczwi.supabase.co/functions/v1/naver-auth', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ naver_code: naverCode }),
                    });

                    const result = await res.json();
                    console.log('[네이버 로그인] Edge Function 응답:', result);

                    if (!res.ok || !result.success) {
                        showError('로그인 처리 실패: ' + (result.error || '알 수 없는 오류'));
                        return;
                    }

                    // verifyOtp로 세션 생성
                    console.log('[네이버 로그인] verifyOtp 시도, token_hash:', result.token_hash?.substring(0, 10) + '...');
                    const { data, error } = await window.supabase.auth.verifyOtp({
                        token_hash: result.token_hash,
                        type: 'magiclink',
                    });

                    if (error) {
                        console.error('[네이버 로그인] verifyOtp 실패:', error);
                        showError('세션 생성 실패: ' + error.message);
                        return;
                    }

                    console.log('[네이버 로그인] 세션 생성 성공');
                    if (data.session) {
                        window.history.replaceState({}, '', 'auth-callback.html');
                        await handleSession(data.session);
                        return;
                    }
                } catch (err) {
                    console.error('[네이버 로그인] 에러:', err);
                    showError('네트워크 오류: ' + err.message);
                    return;
                }
            }

            // 코드 없이 접근 — 기존 세션 확인
            const { data: { session } } = await window.supabase.auth.getSession();
            if (session) {
                await handleSession(session);
                return;
            }

            showError('로그인 처리에 실패했습니다. 다시 시도해주세요.');
        }

        async function handleSession(session) {
            const user = session.user;

            // 프로필 확인 — phone이 비어있으면 추가정보 필요
            const { data: profile } = await window.supabase
                .from('profiles')
                .select('phone, name, naver_id')
                .eq('id', user.id)
                .single();

            if (!profile) {
                showError('프로필을 찾을 수 없습니다.');
                return;
            }

            if (!profile.phone) {
                // 최초 로그인 → 추가정보 입력
                const userName = profile.name || user.user_metadata?.full_name || '';
                showAdditionalInfoForm(userName);
            } else {
                // 기존 유저 → 메인 페이지
                window.location.href = 'index.html';
            }
        }

        init();
    </script>
</body>
</html>
