<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>결제 실패 — ALLROUND</title>
    <link rel="stylesheet" href="https://use.typekit.net/lii5ces.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <script src="js/site-auth.js"></script>
    <style>
        body {
            font-family: "aileron", sans-serif;
            background-color: #000000;
        }
        
        .btn-hover-scale {
            transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out;
        }
        
        .btn-hover-scale:hover {
            transform: translateY(-2px);
        }

        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .nav-link {
            transition: color 0.2s ease-in-out;
        }

        .nav-link:hover {
            color: #999;
        }

        /* 실패 아이콘 애니메이션 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }

        .error-icon {
            animation: shake 0.5s ease-in-out;
        }
    </style>
</head>
<body class="bg-black text-white min-h-screen">
    
    <!-- 상단 네비게이션 바 -->
    <header class="fixed top-0 left-0 right-0 bg-black z-50">
        <div class="max-w-7xl mx-auto px-6 py-4">
            <!-- 로고 라인 -->
            <div class="flex justify-between items-center mb-4">
                <div class="w-32"></div>
                <a href="index.html" class="text-2xl font-bold text-white tracking-wider">ALLROUND</a>
                <div class="w-32 flex justify-end">
                    <div id="auth-buttons" class="flex items-center space-x-4">
                        <a href="auth.html" class="nav-link text-white text-sm">Login</a>
                    </div>
                    <div id="user-menu" class="hidden flex flex-row items-center space-x-4">
                        <a id="admin-link" href="admin.html" class="nav-link text-yellow-400 text-sm hidden">관리자</a>
                        <a href="mypage.html" class="nav-link text-white text-sm">My Page</a>
                        <button onclick="signOut()" class="nav-link text-gray-400 text-sm">Logout</button>
                    </div>
                </div>
            </div>
            
            <!-- 구분선 -->
            <div class="w-full h-px bg-white opacity-20 mb-4"></div>
            
            <!-- 메인 네비게이션 -->
            <nav class="flex justify-center items-center space-x-8 md:space-x-12 text-sm font-light">
                <a href="index.html#about" class="nav-link text-white">ABOUT</a>
                <a href="original.html" class="nav-link text-white">ALLROUND ORIGINAL</a>
                <a href="firstee.html" class="nav-link text-white">ALLROUND FIRSTEE</a>
                <a href="artist.html" class="nav-link text-white">ALLROUND ARTIST</a>
                <a href="courses.html" class="nav-link text-white">강의</a>
            </nav>
        </div>
    </header>

    <div class="h-36"></div>

    <!-- Fail Content -->
    <section class="py-20 px-6">
        <div class="max-w-xl mx-auto text-center space-y-8">
            
            <!-- 실패 아이콘 -->
            <div class="flex justify-center">
                <svg class="error-icon w-24 h-24 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
            </div>

            <!-- 메시지 -->
            <div class="space-y-4">
                <h1 class="text-3xl font-bold text-white">결제에 실패했습니다</h1>
                <p id="fail-message" class="text-gray-400">결제 중 문제가 발생했습니다. 다시 시도해주세요.</p>
            </div>

            <!-- 오류 정보 -->
            <div id="error-info" class="p-6 bg-white bg-opacity-5 rounded-xl space-y-4 text-left hidden">
                <h2 class="text-lg font-semibold text-white text-center">오류 정보</h2>
                <div class="w-full h-px bg-white opacity-10"></div>
                <div class="space-y-3">
                    <div class="flex justify-between">
                        <span class="text-gray-400">오류 코드</span>
                        <span id="error-code" class="text-white text-sm">-</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-400">오류 메시지</span>
                        <span id="error-message" class="text-white text-sm">-</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-400">주문번호</span>
                        <span id="order-id" class="text-white text-sm">-</span>
                    </div>
                </div>
            </div>

            <!-- 안내 메시지 -->
            <div class="text-sm text-gray-500 space-y-2">
                <p>결제가 완료되지 않았습니다.</p>
                <p>문제가 지속될 경우 고객센터로 문의해주세요.</p>
            </div>

            <!-- 버튼 -->
            <div class="flex flex-col sm:flex-row gap-4 pt-4">
                <a href="courses.html" class="btn-hover-scale flex-1 px-8 py-4 bg-transparent text-white font-semibold rounded-xl border-2 border-white text-center">
                    강의 목록
                </a>
                <button id="retry-button" onclick="retryPayment()" class="btn-hover-scale flex-1 px-8 py-4 bg-white text-black font-semibold rounded-xl">
                    다시 시도하기
                </button>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer class="py-12 px-6">
        <div class="max-w-6xl mx-auto">
            <div class="w-full h-px bg-white opacity-20 mb-8"></div>
            <div class="flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0">
                <div class="text-2xl font-bold text-white tracking-wider">ALLROUND</div>
                <div class="text-sm text-gray-400">
                    © 2024 ALLROUND. All rights reserved.
                </div>
            </div>
        </div>
    </footer>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        let failedOrderId = null;
        let failedCourseId = null;

        // URL에서 실패 정보 파라미터 가져오기
        function getFailParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                code: params.get('code'),
                message: params.get('message'),
                orderId: params.get('orderId')
            };
        }

        // 결제 실패 처리
        async function handlePaymentFail() {
            const { code, message, orderId } = getFailParams();
            
            failedOrderId = orderId;
            
            // 오류 메시지 표시
            if (message) {
                document.getElementById('fail-message').textContent = decodeURIComponent(message);
            }
            
            // 오류 정보 표시
            if (code || orderId) {
                document.getElementById('error-info').classList.remove('hidden');
                
                if (code) {
                    document.getElementById('error-code').textContent = code;
                }
                if (orderId) {
                    document.getElementById('order-id').textContent = orderId;
                    
                    // 주문 정보에서 course_id 가져오기
                    try {
                        const { data: order } = await window.supabase
                            .from('orders')
                            .select('course_id')
                            .eq('id', orderId)
                            .single();
                        
                        if (order) {
                            failedCourseId = order.course_id;
                        }
                        
                        // 주문 상태를 FAILED로 업데이트
                        await window.supabase
                            .from('orders')
                            .update({
                                status: 'FAILED',
                                updated_at: new Date().toISOString()
                            })
                            .eq('id', orderId);
                    } catch (error) {
                        console.error('Order update error:', error);
                    }
                }
                if (message) {
                    document.getElementById('error-message').textContent = decodeURIComponent(message);
                }
            }
        }

        // 결제 다시 시도
        function retryPayment() {
            if (failedCourseId) {
                // 강의 ID가 있으면 결제 페이지로 이동
                window.location.href = `payment.html?courseId=${failedCourseId}`;
            } else if (failedOrderId) {
                // 주문 ID만 있으면 주문 ID로 결제 페이지 이동
                window.location.href = `payment.html?orderId=${failedOrderId}`;
            } else {
                // 아무 정보도 없으면 강의 목록으로
                window.location.href = 'courses.html';
            }
        }

        // 페이지 로드 시 실행
        document.addEventListener('DOMContentLoaded', handlePaymentFail);
    </script>
</body>
</html>
