<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="google-site-verification" content="WNwZFDVX7UaW_NACddXD11x8oo7S-LWx8Pdk-H2XVzE">
    <title>결제 실패 — ALLROUND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Libre+Bodoni:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/page-shell.css">
    <link rel="stylesheet" href="https://use.typekit.net/jmj4ims.css">
    <style>
        body {
            font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
            background-color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }
        .font-suit { font-family: 'SUIT Variable', 'SUIT', sans-serif; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .error-icon { animation: shake 0.5s ease-in-out; }
    </style>
</head>
<body data-active-page="payment-fail">

    <header class="main-header">
      <div class="shell-container">
        <div class="shell-logo-wrap">
          <a href="index.html" class="shell-logo"><img src="img/logo.png" alt="ALLROUND"></a>
        </div>
        <div class="shell-header-right">
          <div id="auth-buttons" class="shell-auth-buttons">
            <a href="auth.html">Login</a>
            <a href="auth.html?mode=signup">Sign up</a>
          </div>
          <div id="user-menu" class="shell-user-menu">
            <a id="admin-link" class="admin-link" href="admin.html">관리자</a>
            <a href="mypage.html">My Page</a>
            <button onclick="signOut()">Logout</button>
          </div>
          <a href="https://pf.kakao.com/_KMbxon" target="_blank" rel="noopener" class="kakao-header"><img src="img/kakao-icon.png" alt=""></a>
          <a href="#" class="menu-btn"><img src="img/menu-icon.png" alt="menu"></a>
          <a href="https://pf.kakao.com/_KMbxon" target="_blank" rel="noopener" class="shell-kakao-btn">
            <img src="img/kakao-icon.png" alt="카카오톡"><span>카톡 상담</span>
          </a>
        </div>
      </div>
    </header>
    <div class="shell-menu-overlay"></div>

    <main class="shell-main">
      <div class="shell-grid">
        <aside class="shell-left-bar">
          <button type="button" class="shell-menu-close" aria-label="메뉴 닫기">&times;</button>
          <div class="left-menu"></div>
        </aside>
        <section class="shell-content">
                <div class="px-6 md:px-12 py-20">
                    <div class="max-w-xl md:ml-[24px] text-center space-y-6">

                        <!-- 실패 아이콘 -->
                        <div class="flex justify-center">
                            <svg class="error-icon w-20 h-20 text-red-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
                            </svg>
                        </div>

                        <!-- 메시지 -->
                        <div class="space-y-2">
                            <h1 class="text-[26px] font-bold text-[#2F2725]">결제에 실패했습니다</h1>
                            <p id="fail-message" class="text-[#8B95A1] text-[15px]">결제 중 문제가 발생했습니다. 다시 시도해주세요.</p>
                        </div>

                        <!-- 오류 정보 -->
                        <div id="error-info" class="bg-white rounded-2xl border border-gray-200 p-6 space-y-4 text-left hidden">
                            <h2 class="text-[16px] font-bold text-[#2F2725] text-center">오류 정보</h2>
                            <div class="w-full h-px bg-gray-100"></div>
                            <div class="space-y-3">
                                <div class="flex justify-between">
                                    <span class="text-[#8B95A1]">오류 코드</span>
                                    <span id="error-code" class="text-[#2F2725] text-sm">-</span>
                                </div>
                                <div class="flex justify-between">
                                    <span class="text-[#8B95A1]">오류 메시지</span>
                                    <span id="error-message" class="text-[#2F2725] text-sm">-</span>
                                </div>
                                <div class="flex justify-between">
                                    <span class="text-[#8B95A1]">주문번호</span>
                                    <span id="order-id" class="text-[#2F2725] text-sm">-</span>
                                </div>
                            </div>
                        </div>

                        <!-- 안내 메시지 -->
                        <div class="text-sm text-[#C5C5C5] space-y-1">
                            <p>결제가 완료되지 않았습니다.</p>
                            <p>문제가 지속될 경우 고객센터로 문의해주세요.</p>
                        </div>

                        <!-- 버튼 -->
                        <div class="flex flex-col sm:flex-row gap-3 pt-2">
                            <a href="online-class.html" class="flex-1 px-6 py-4 bg-white text-[#2F2725] font-semibold rounded-2xl border border-gray-200 text-center hover:bg-gray-50 transition-colors">
                                강의 목록
                            </a>
                            <button id="retry-button" onclick="retryPayment()" class="flex-1 px-6 py-4 bg-[#2F2725] text-white font-semibold rounded-2xl hover:bg-[#1a1716] transition-colors">
                                다시 시도하기
                            </button>
                        </div>

                    </div>
                </div>
        </section>
      </div>
    </main>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/popup-notice.js"></script>
    <script>
        let failedOrderId = null;
        let failedCourseId = null;

        function getFailParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                code: params.get('code'),
                message: params.get('message'),
                orderId: params.get('orderId')
            };
        }

        async function handlePaymentFail() {
            const { code, message, orderId } = getFailParams();

            failedOrderId = orderId;

            if (message) {
                document.getElementById('fail-message').textContent = decodeURIComponent(message);
            }

            if (code || orderId) {
                document.getElementById('error-info').classList.remove('hidden');

                if (code) {
                    document.getElementById('error-code').textContent = code;
                }
                if (orderId) {
                    document.getElementById('order-id').textContent = orderId;

                    try {
                        const { data: order } = await window.supabase
                            .from('orders')
                            .select('course_id')
                            .eq('id', orderId)
                            .single();

                        if (order) {
                            failedCourseId = order.course_id;
                        }

                        await window.supabase
                            .from('orders')
                            .update({
                                status: 'FAILED',
                                updated_at: new Date().toISOString()
                            })
                            .eq('id', orderId);
                    } catch (error) {
                        console.error('Order update error:', error);
                    }
                }
                if (message) {
                    document.getElementById('error-message').textContent = decodeURIComponent(message);
                }
            }
        }

        function retryPayment() {
            if (failedCourseId) {
                window.location.href = `payment.html?courseId=${failedCourseId}`;
            } else if (failedOrderId) {
                window.location.href = `payment.html?orderId=${failedOrderId}`;
            } else {
                window.location.href = 'online-class.html';
            }
        }

        document.addEventListener('DOMContentLoaded', handlePaymentFail);
    </script>
    <script src="js/sidebar.js"></script>
    <script src="js/footer.js"></script>
</body>
</html>
