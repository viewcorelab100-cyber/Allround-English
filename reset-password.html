<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Reset Password — ALLROUND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <!-- Fonts: 메인 페이지 동일 -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Libre+Bodoni:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --page-right: min(8.28vw, 159px);
            --header-h: 126px;
            --sidebar-w: min(21.77vw, 418px);
            --sidebar-gap: min(3.75vw, 72px);
        }
        body {
            font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
            background-color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }
        .font-suit { font-family: 'SUIT Variable', 'SUIT', sans-serif; }
        .sidebar-link { transition: color 0.2s ease; }
        .sidebar-link:hover { color: #2F2725 !important; }
        .kakao-btn { display: inline-block; }
        .mobile-menu-overlay { transition: opacity 0.3s ease; }
        .mobile-menu-panel { transition: transform 0.3s ease; }

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-text-fill-color: #2F2725;
            -webkit-box-shadow: 0 0 0px 1000px #ffffff inset;
            transition: background-color 5000s ease-in-out 0s;
        }

        input, textarea, select {
            border-radius: 0px !important;
        }

        .btn-primary {
            background-color: #13372A;
            color: white;
            border-radius: 0px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #1a4a38;
        }

        .btn-hover-scale {
            transition: transform 0.2s ease-in-out;
        }
        .btn-hover-scale:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col" data-active-page="auth">

    <!-- Header (메인 페이지 동일) -->
    <header class="fixed top-0 left-0 right-0 bg-white z-50 flex items-center" style="height: var(--header-h);">
        <div class="flex-shrink-0 flex justify-end" style="width: var(--sidebar-w); padding-right: var(--sidebar-gap);">
            <a href="index.html">
                <img src="logo.png" alt="ALLROUND" class="h-4 md:h-[17px] w-auto" style="filter: brightness(0);">
            </a>
        </div>
        <div class="ml-auto flex items-center" style="padding-right: var(--page-right); gap: 67px;">
            <div id="auth-buttons" class="flex items-center" style="gap: 59px;">
                <a href="auth.html" class="text-[#3E3A39] font-bold text-[20px] leading-[20px] tracking-[-0.2px] hover:opacity-60 transition-opacity">Login</a>
                <a href="auth.html?mode=signup" class="text-[#3E3A39] font-bold text-[20px] leading-[20px] tracking-[-0.2px] hover:opacity-60 transition-opacity">Sign up</a>
            </div>
            <div id="user-menu" class="hidden items-center gap-6">
                <a id="admin-link" href="admin.html" class="text-yellow-600 font-medium text-sm hidden">관리자</a>
                <a href="mypage.html" class="text-[#3E3A39] font-medium text-lg lg:text-xl hover:opacity-60 transition-opacity">My Page</a>
                <button onclick="signOut()" class="text-[#9FA0A0] font-medium text-lg lg:text-xl hover:opacity-60 transition-opacity">Logout</button>
            </div>
            <button id="hamburger-btn" class="lg:hidden flex-shrink-0" onclick="toggleMobileMenu()">
                <img src="asset/main/햄버거버튼.png" alt="메뉴" class="h-5 w-auto">
            </button>
            <button class="hidden lg:block flex-shrink-0 hover:opacity-60 transition-opacity">
                <img src="asset/main/햄버거버튼.png" alt="메뉴" class="h-6 w-auto">
            </button>
        </div>
    </header>

    <!-- Mobile Menu -->
    <div id="mobile-menu" class="fixed inset-0 z-[60] hidden">
        <div class="mobile-menu-overlay absolute inset-0 bg-black/40" onclick="toggleMobileMenu()"></div>
        <div class="mobile-menu-panel absolute top-0 right-0 w-[280px] h-full bg-white shadow-xl translate-x-full overflow-y-auto">
            <div class="p-6 pt-20">
                <button class="absolute top-5 right-5 text-2xl text-[#2F2725]" onclick="toggleMobileMenu()">&times;</button>
                <nav class="space-y-6">
                    <!-- sidebar.js가 주입 -->
                </nav>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="flex-1 relative" style="padding-top: var(--header-h);">
        <div class="flex min-h-[calc(100vh-var(--header-h))]">

            <!-- Left Sidebar (Desktop) -->
            <aside class="hidden lg:flex flex-col justify-center flex-shrink-0 bg-white relative z-10" style="width: var(--sidebar-w); padding-right: var(--sidebar-gap);">
                <nav class="text-right space-y-6">
                    <!-- sidebar.js가 주입 -->
                </nav>
            </aside>

            <!-- 본문 컨텐츠 -->
            <div class="flex-1 relative overflow-y-auto" style="background-color: #F5F5F5;">

                <!-- 카톡 문의 -->
                <div class="hidden lg:block fixed z-50" style="right: min(13.44vw, 258px); top: 143px;">
                    <a href="https://pf.kakao.com/_KMbxon" target="_blank" rel="noopener" class="kakao-btn relative inline-block">
                        <img src="asset/main/카톡 배경.png" alt="카톡 상담" class="h-[62px] w-[187px] object-contain block">
                        <div class="absolute inset-0 flex items-center justify-end pr-[16%] pointer-events-none">
                            <span class="text-[#2F2725] text-[20px] font-bold tracking-[-0.2px]">카톡 상담</span>
                        </div>
                    </a>
                </div>

                <!-- Reset Password Card -->
                <div class="flex items-start justify-center px-4 md:px-6 py-12 md:py-20">
                    <div class="w-full max-w-md bg-white p-8 md:p-10 shadow-sm">

                        <!-- Loading state -->
                        <div id="reset-loading" class="space-y-6 text-center">
                            <h2 class="text-xl font-bold text-[#2F2725] uppercase tracking-widest">Reset Password</h2>
                            <p class="text-[10px] text-[#9FA0A0] uppercase tracking-wider">인증 정보를 확인하고 있습니다...</p>
                        </div>

                        <!-- Reset form -->
                        <div id="reset-form" class="space-y-8 hidden">
                            <div class="text-center space-y-2">
                                <h2 class="text-xl font-bold text-[#2F2725] uppercase tracking-widest">Reset Password</h2>
                                <p class="text-[10px] text-[#9FA0A0] uppercase tracking-wider">새로운 비밀번호를 입력해주세요.</p>
                            </div>
                            <div>
                                <label class="block text-[10px] font-semibold text-[#9FA0A0] mb-2 uppercase tracking-widest">New Password</label>
                                <input type="password" id="new-password"
                                       class="w-full px-4 py-4 bg-white border border-gray-300 text-[#2F2725] placeholder-gray-400 focus:outline-none focus:border-[#2F2725] transition-colors"
                                       placeholder="Min. 8 characters">
                            </div>
                            <div>
                                <label class="block text-[10px] font-semibold text-[#9FA0A0] mb-2 uppercase tracking-widest">Confirm Password</label>
                                <input type="password" id="confirm-password"
                                       class="w-full px-4 py-4 bg-white border border-gray-300 text-[#2F2725] placeholder-gray-400 focus:outline-none focus:border-[#2F2725] transition-colors"
                                       placeholder="Repeat your password">
                            </div>
                            <div id="reset-message" class="text-[10px] uppercase tracking-wider hidden"></div>
                            <button id="reset-btn" onclick="handleResetPassword()"
                                    class="btn-hover-scale w-full px-8 py-4 bg-[#13372A] text-white font-bold text-xs uppercase tracking-[0.2em]">
                                Update Password
                            </button>
                            <div class="text-center">
                                <a href="auth.html" class="text-[10px] text-[#9FA0A0] uppercase tracking-widest hover:text-[#2F2725] transition-colors">&larr; Back to Login</a>
                            </div>
                        </div>

                        <!-- Error state (invalid/expired token) -->
                        <div id="reset-error" class="space-y-8 hidden">
                            <div class="text-center space-y-2">
                                <h2 class="text-xl font-bold text-[#2F2725] uppercase tracking-widest">Reset Password</h2>
                                <p class="text-sm text-red-500 leading-relaxed">링크가 만료되었거나 유효하지 않습니다.<br>비밀번호 재설정을 다시 요청해주세요.</p>
                            </div>
                            <a href="auth.html"
                               class="btn-hover-scale block w-full px-8 py-4 bg-[#13372A] text-white font-bold text-xs uppercase tracking-[0.2em] text-center">
                                Back to Login
                            </a>
                        </div>

                        <!-- Success state -->
                        <div id="reset-success" class="space-y-8 hidden">
                            <div class="text-center space-y-2">
                                <h2 class="text-xl font-bold text-[#2F2725] uppercase tracking-widest">Complete</h2>
                                <p class="text-sm text-green-600 leading-relaxed">비밀번호가 성공적으로 변경되었습니다.<br>새 비밀번호로 로그인해주세요.</p>
                            </div>
                            <a href="auth.html"
                               class="btn-hover-scale block w-full px-8 py-4 bg-[#13372A] text-white font-bold text-xs uppercase tracking-[0.2em] text-center">
                                Go to Login
                            </a>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </main>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/popup-notice.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        // 모바일 메뉴 토글
        function toggleMobileMenu() {
            const menu = document.getElementById('mobile-menu');
            const panel = menu.querySelector('.mobile-menu-panel');
            const overlay = menu.querySelector('.mobile-menu-overlay');

            if (menu.classList.contains('hidden')) {
                menu.classList.remove('hidden');
                requestAnimationFrame(() => {
                    panel.style.transform = 'translateX(0)';
                    overlay.style.opacity = '1';
                });
            } else {
                panel.style.transform = 'translateX(100%)';
                overlay.style.opacity = '0';
                setTimeout(() => menu.classList.add('hidden'), 300);
            }
        }

        // Show specific state
        let passwordResetDone = false;
        function showState(state) {
            if (passwordResetDone && state !== 'success') return;
            if (state === 'success') passwordResetDone = true;
            document.getElementById('reset-loading').classList.add('hidden');
            document.getElementById('reset-form').classList.add('hidden');
            document.getElementById('reset-error').classList.add('hidden');
            document.getElementById('reset-success').classList.add('hidden');
            document.getElementById('reset-' + state).classList.remove('hidden');
        }

        // Handle password update
        async function handleResetPassword() {
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const messageDiv = document.getElementById('reset-message');
            const btn = document.getElementById('reset-btn');

            messageDiv.classList.add('hidden');

            if (!newPassword || !confirmPassword) {
                messageDiv.textContent = '비밀번호를 입력해주세요.';
                messageDiv.classList.remove('hidden');
                messageDiv.classList.add('text-red-500');
                messageDiv.classList.remove('text-green-600');
                return;
            }

            if (newPassword.length < 8) {
                messageDiv.textContent = '비밀번호는 8자 이상이어야 합니다.';
                messageDiv.classList.remove('hidden');
                messageDiv.classList.add('text-red-500');
                messageDiv.classList.remove('text-green-600');
                return;
            }

            if (newPassword !== confirmPassword) {
                messageDiv.textContent = '비밀번호가 일치하지 않습니다.';
                messageDiv.classList.remove('hidden');
                messageDiv.classList.add('text-red-500');
                messageDiv.classList.remove('text-green-600');
                return;
            }

            // Disable button while processing
            btn.disabled = true;
            btn.textContent = 'Updating...';
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const { error } = await window.supabase.auth.updateUser({ password: newPassword });

                if (error) {
                    messageDiv.textContent = error.message || '비밀번호 변경에 실패했습니다.';
                    messageDiv.classList.remove('hidden');
                    messageDiv.classList.add('text-red-500');
                    messageDiv.classList.remove('text-green-600');
                    btn.disabled = false;
                    btn.textContent = 'Update Password';
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                    return;
                }

                // 성공 화면 먼저 표시 후 signOut (순서 중요)
                showState('success');
                history.replaceState(null, '', window.location.pathname);
                await window.supabase.auth.signOut();
            } catch (err) {
                messageDiv.textContent = '오류가 발생했습니다. 다시 시도해주세요.';
                messageDiv.classList.remove('hidden');
                messageDiv.classList.add('text-red-500');
                messageDiv.classList.remove('text-green-600');
                btn.disabled = false;
                btn.textContent = 'Update Password';
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        // On page load: wait for Supabase to process the recovery token from URL hash
        document.addEventListener('DOMContentLoaded', () => {
            const checkInit = setInterval(() => {
                if (window.supabase) {
                    clearInterval(checkInit);
                    initResetPage();
                }
            }, 100);

            setTimeout(() => {
                clearInterval(checkInit);
                const loadingVisible = !document.getElementById('reset-loading').classList.contains('hidden');
                if (loadingVisible) {
                    showState('error');
                }
            }, 10000);
        });

        async function initResetPage() {
            const hash = window.location.hash;
            const params = new URLSearchParams(window.location.search);
            const hasHashToken = hash && (hash.includes('access_token') || hash.includes('type=recovery'));
            const hasCodeParam = params.has('code');

            // 토큰이 URL에 없으면 기존 세션 확인
            if (!hasHashToken && !hasCodeParam) {
                const { data: { session } } = await window.supabase.auth.getSession();
                if (session) {
                    showState('form');
                } else {
                    showState('error');
                }
                return;
            }

            // PKCE flow (?code=) 또는 hash flow (#access_token) 모두
            // Supabase가 자동으로 세션을 설정하고 onAuthStateChange로 알림
            const { data: { subscription } } = window.supabase.auth.onAuthStateChange((event, session) => {
                if (event === 'PASSWORD_RECOVERY') {
                    showState('form');
                    subscription.unsubscribe();
                } else if (event === 'SIGNED_IN' && session) {
                    showState('form');
                    subscription.unsubscribe();
                }
            });

            // Fallback: 8초 후에도 이벤트가 안 오면 세션 직접 확인
            setTimeout(async () => {
                const loadingVisible = !document.getElementById('reset-loading').classList.contains('hidden');
                if (loadingVisible) {
                    const { data: { session } } = await window.supabase.auth.getSession();
                    if (session) {
                        showState('form');
                    } else {
                        showState('error');
                    }
                    subscription.unsubscribe();
                }
            }, 8000);
        }

        // Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const formVisible = !document.getElementById('reset-form').classList.contains('hidden');
                if (formVisible) handleResetPassword();
            }
        });
    </script>
    <script src="js/footer.js"></script>
</body>
</html>
