<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Reset Password — ALLROUND</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <!-- Fonts: 메인 페이지 동일 -->
    <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/sunn-us/SUIT/fonts/variable/woff2/SUIT-Variable.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400&family=Libre+Bodoni:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/page-shell.css">
    <link rel="stylesheet" href="https://use.typekit.net/jmj4ims.css">
    <style>
        body {
            font-family: 'Pretendard Variable', Pretendard, -apple-system, sans-serif;
            background-color: #ffffff;
            margin: 0;
            overflow-x: hidden;
        }
        .font-suit { font-family: 'SUIT Variable', 'SUIT', sans-serif; }

        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-text-fill-color: #2F2725;
            -webkit-box-shadow: 0 0 0px 1000px #ffffff inset;
            transition: background-color 5000s ease-in-out 0s;
        }

        input, textarea, select {
            border-radius: 0px !important;
        }

        .btn-primary {
            background-color: #13372A;
            color: white;
            border-radius: 0px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-primary:hover {
            background-color: #1a4a38;
        }

        .btn-hover-scale {
            transition: transform 0.2s ease-in-out;
        }
        .btn-hover-scale:hover {
            transform: translateY(-2px);
        }
    </style>
</head>
<body data-active-page="auth">

    <header class="main-header">
      <div class="shell-container">
        <div class="shell-logo-wrap">
          <a href="index.html" class="shell-logo"><img src="img/logo.png" alt="ALLROUND"></a>
        </div>
        <div class="shell-header-right">
          <div id="auth-buttons" class="shell-auth-buttons">
            <a href="auth.html">Login</a>
            <a href="auth.html?mode=signup">Sign up</a>
          </div>
          <div id="user-menu" class="shell-user-menu">
            <a id="admin-link" class="admin-link" href="admin.html">관리자</a>
            <a href="mypage.html">My Page</a>
            <button onclick="signOut()">Logout</button>
          </div>
          <a href="https://pf.kakao.com/_KMbxon" target="_blank" rel="noopener" class="kakao-header"><img src="img/kakao-icon.png" alt=""></a>
          <a href="#" class="menu-btn"><img src="img/menu-icon.png" alt="menu"></a>
          <a href="https://pf.kakao.com/_KMbxon" target="_blank" rel="noopener" class="shell-kakao-btn">
            <img src="img/kakao-icon.png" alt="카카오톡"><span>카톡 상담</span>
          </a>
        </div>
      </div>
    </header>
    <div class="shell-menu-overlay"></div>

    <main class="shell-main">
      <div class="shell-grid">
        <aside class="shell-left-bar">
          <button type="button" class="shell-menu-close" aria-label="메뉴 닫기">&times;</button>
          <div class="left-menu"></div>
        </aside>
        <section class="shell-content">

                <!-- Reset Password Card -->
                <div class="flex items-start justify-center px-4 md:px-6 py-12 md:py-20">
                    <div class="w-full max-w-md bg-white p-8 md:p-10 shadow-sm">

                        <!-- Loading state -->
                        <div id="reset-loading" class="space-y-6 text-center">
                            <h2 class="text-xl font-bold text-[#2F2725] uppercase tracking-widest">Reset Password</h2>
                            <p class="text-[10px] text-[#9FA0A0] uppercase tracking-wider">인증 정보를 확인하고 있습니다...</p>
                        </div>

                        <!-- Reset form -->
                        <div id="reset-form" class="space-y-8 hidden">
                            <div class="text-center space-y-2">
                                <h2 class="text-xl font-bold text-[#2F2725] uppercase tracking-widest">Reset Password</h2>
                                <p class="text-[10px] text-[#9FA0A0] uppercase tracking-wider">새로운 비밀번호를 입력해주세요.</p>
                            </div>
                            <div>
                                <label class="block text-[10px] font-semibold text-[#9FA0A0] mb-2 uppercase tracking-widest">New Password</label>
                                <input type="password" id="new-password"
                                       class="w-full px-4 py-4 bg-white border border-gray-300 text-[#2F2725] placeholder-gray-400 focus:outline-none focus:border-[#2F2725] transition-colors"
                                       placeholder="Min. 8 characters">
                            </div>
                            <div>
                                <label class="block text-[10px] font-semibold text-[#9FA0A0] mb-2 uppercase tracking-widest">Confirm Password</label>
                                <input type="password" id="confirm-password"
                                       class="w-full px-4 py-4 bg-white border border-gray-300 text-[#2F2725] placeholder-gray-400 focus:outline-none focus:border-[#2F2725] transition-colors"
                                       placeholder="Repeat your password">
                            </div>
                            <div id="reset-message" class="text-[10px] uppercase tracking-wider hidden"></div>
                            <button id="reset-btn" onclick="handleResetPassword()"
                                    class="btn-hover-scale w-full px-8 py-4 bg-[#13372A] text-white font-bold text-xs uppercase tracking-[0.2em]">
                                Update Password
                            </button>
                            <div class="text-center">
                                <a href="auth.html" class="text-[10px] text-[#9FA0A0] uppercase tracking-widest hover:text-[#2F2725] transition-colors">&larr; Back to Login</a>
                            </div>
                        </div>

                        <!-- Error state (invalid/expired token) -->
                        <div id="reset-error" class="space-y-8 hidden">
                            <div class="text-center space-y-2">
                                <h2 class="text-xl font-bold text-[#2F2725] uppercase tracking-widest">Reset Password</h2>
                                <p class="text-sm text-red-500 leading-relaxed">링크가 만료되었거나 유효하지 않습니다.<br>비밀번호 재설정을 다시 요청해주세요.</p>
                            </div>
                            <a href="auth.html"
                               class="btn-hover-scale block w-full px-8 py-4 bg-[#13372A] text-white font-bold text-xs uppercase tracking-[0.2em] text-center">
                                Back to Login
                            </a>
                        </div>

                        <!-- Success state -->
                        <div id="reset-success" class="space-y-8 hidden">
                            <div class="text-center space-y-2">
                                <h2 class="text-xl font-bold text-[#2F2725] uppercase tracking-widest">Complete</h2>
                                <p class="text-sm text-green-600 leading-relaxed">비밀번호가 성공적으로 변경되었습니다.<br>새 비밀번호로 로그인해주세요.</p>
                            </div>
                            <a href="auth.html"
                               class="btn-hover-scale block w-full px-8 py-4 bg-[#13372A] text-white font-bold text-xs uppercase tracking-[0.2em] text-center">
                                Go to Login
                            </a>
                        </div>

                    </div>
                </div>

        </section>
      </div>
    </main>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/sidebar.js"></script>
    <script>
        // Show specific state
        function showState(state) {
            document.getElementById('reset-loading').classList.add('hidden');
            document.getElementById('reset-form').classList.add('hidden');
            document.getElementById('reset-error').classList.add('hidden');
            document.getElementById('reset-success').classList.add('hidden');
            document.getElementById('reset-' + state).classList.remove('hidden');
        }

        // Handle password update
        async function handleResetPassword() {
            const newPassword = document.getElementById('new-password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const messageDiv = document.getElementById('reset-message');
            const btn = document.getElementById('reset-btn');

            messageDiv.classList.add('hidden');

            if (!newPassword || !confirmPassword) {
                messageDiv.textContent = '비밀번호를 입력해주세요.';
                messageDiv.classList.remove('hidden');
                messageDiv.classList.add('text-red-500');
                messageDiv.classList.remove('text-green-600');
                return;
            }

            if (newPassword.length < 8) {
                messageDiv.textContent = '비밀번호는 8자 이상이어야 합니다.';
                messageDiv.classList.remove('hidden');
                messageDiv.classList.add('text-red-500');
                messageDiv.classList.remove('text-green-600');
                return;
            }

            if (newPassword !== confirmPassword) {
                messageDiv.textContent = '비밀번호가 일치하지 않습니다.';
                messageDiv.classList.remove('hidden');
                messageDiv.classList.add('text-red-500');
                messageDiv.classList.remove('text-green-600');
                return;
            }

            // Disable button while processing
            btn.disabled = true;
            btn.textContent = 'Updating...';
            btn.classList.add('opacity-50', 'cursor-not-allowed');

            try {
                const { error } = await window.supabase.auth.updateUser({ password: newPassword });

                if (error) {
                    messageDiv.textContent = error.message || '비밀번호 변경에 실패했습니다.';
                    messageDiv.classList.remove('hidden');
                    messageDiv.classList.add('text-red-500');
                    messageDiv.classList.remove('text-green-600');
                    btn.disabled = false;
                    btn.textContent = 'Update Password';
                    btn.classList.remove('opacity-50', 'cursor-not-allowed');
                    return;
                }

                // Sign out after password change so user logs in with new password
                await window.supabase.auth.signOut();
                showState('success');
            } catch (err) {
                messageDiv.textContent = '오류가 발생했습니다. 다시 시도해주세요.';
                messageDiv.classList.remove('hidden');
                messageDiv.classList.add('text-red-500');
                messageDiv.classList.remove('text-green-600');
                btn.disabled = false;
                btn.textContent = 'Update Password';
                btn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        // On page load: wait for Supabase to process the recovery token from URL hash
        document.addEventListener('DOMContentLoaded', () => {
            const checkInit = setInterval(() => {
                if (window.supabase) {
                    clearInterval(checkInit);
                    initResetPage();
                }
            }, 100);

            setTimeout(() => {
                clearInterval(checkInit);
                showState('error');
            }, 10000);
        });

        async function initResetPage() {
            // Supabase auto-detects the hash fragment and establishes a session
            // via onAuthStateChange with event === 'PASSWORD_RECOVERY'
            // We listen for it to confirm the token is valid
            const hash = window.location.hash;

            // Check if there's a recovery token in the URL
            if (!hash || (!hash.includes('access_token') && !hash.includes('type=recovery'))) {
                // No token - check if user already has an active session (e.g., came from email link that was already processed)
                const { data: { session } } = await window.supabase.auth.getSession();
                if (session) {
                    showState('form');
                } else {
                    showState('error');
                }
                return;
            }

            // Listen for the PASSWORD_RECOVERY event
            const { data: { subscription } } = window.supabase.auth.onAuthStateChange((event, session) => {
                if (event === 'PASSWORD_RECOVERY') {
                    showState('form');
                    subscription.unsubscribe();
                } else if (event === 'SIGNED_IN' && session) {
                    // Some Supabase versions fire SIGNED_IN instead of PASSWORD_RECOVERY
                    showState('form');
                    subscription.unsubscribe();
                }
            });

            // Fallback: if no event fires within 5 seconds, check session directly
            setTimeout(async () => {
                const loadingVisible = !document.getElementById('reset-loading').classList.contains('hidden');
                if (loadingVisible) {
                    const { data: { session } } = await window.supabase.auth.getSession();
                    if (session) {
                        showState('form');
                    } else {
                        showState('error');
                    }
                    subscription.unsubscribe();
                }
            }, 5000);
        }

        // Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const formVisible = !document.getElementById('reset-form').classList.contains('hidden');
                if (formVisible) handleResetPassword();
            }
        });
    </script>
    <script src="js/footer.js"></script>
</body>
</html>
