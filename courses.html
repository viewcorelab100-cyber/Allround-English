<!DOCTYPE html>
<html lang="ko">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://use.typekit.net/lii5ces.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@supabase/supabase-js@2.39.0/dist/umd/supabase.js"></script>
    <style>
        body {
            font-family: 'Noto Sans KR', "Poppins", sans-serif;
            background-color: #000000;
        }
        
        /* 상단바 제외한 본문 영문 폰트 */
        .main-content {
            font-family: "Poppins", 'Noto Sans KR', sans-serif;
        }
        
        /* 상단바 스타일 */
        header, header * {
            font-family: "Poppins", sans-serif;
        }
        
        html {
            scroll-behavior: smooth;
            overflow-x: hidden;
        }

        .nav-link {
            transition: color 0.2s ease-in-out;
        }

        .nav-link:hover {
            color: #999;
        }

        /* Minimal Course Card */
        .course-card {
            transition: all 0.5s cubic-bezier(0.2, 1, 0.3, 1);
            display: block;
        }
        
        .course-image-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            border-radius: 4px;
            margin-bottom: 1.5rem;
        }
        
        .course-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }
        
        .course-card:hover .course-image {
            transform: scale(1.05);
        }

        .category-tag {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #666;
            margin-bottom: 0.5rem;
            display: block;
        }

        .course-title {
            font-size: 1.1rem;
            font-weight: 600;
            line-height: 1.4;
            color: #fff;
            margin-bottom: 0.75rem;
            word-break: keep-all;
        }

        .course-meta {
            font-size: 10px;
            color: #444;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body class="bg-black text-white min-h-screen">
    
    <!-- 상단 네비게이션 바 -->
    <header class="fixed top-0 left-0 right-0 bg-black z-50">
        <div class="max-w-7xl mx-auto px-4 md:px-6 py-4">
            <!-- 로고 라인 (3-column Grid: 로고 항상 중앙 고정) -->
            <div class="grid grid-cols-3 items-center mb-4" style="height: 24px;">
                <!-- 좌측: 모바일 햄버거 메뉴 -->
                <div class="flex justify-start items-center">
                    <button id="mobile-menu-btn" class="md:hidden text-white w-6 h-6 flex flex-col justify-center items-center space-y-1">
                        <span class="block w-5 h-0.5 bg-white transition-all"></span>
                        <span class="block w-5 h-0.5 bg-white transition-all"></span>
                        <span class="block w-5 h-0.5 bg-white transition-all"></span>
                    </button>
                </div>

                <!-- 중앙: 로고 (grid 중앙 고정) -->
                <div class="flex justify-center items-center">
                    <a href="index.html" class="flex items-center">
                        <img src="/logo.png" alt="ALLROUND" class="header-logo" style="height: 1rem; width: auto;">
                    </a>
                </div>

                <!-- 우측: Auth 버튼 영역 -->
                <div class="flex justify-end items-center">
                    <div id="auth-buttons" class="flex items-center space-x-2 md:space-x-4 whitespace-nowrap">
                        <a href="auth.html" class="nav-link text-white text-xs md:text-sm whitespace-nowrap">Login</a>
                        <a href="auth.html?mode=signup" class="nav-link text-white text-xs md:text-sm whitespace-nowrap hidden sm:inline">Sign Up</a>
                    </div>
                    <div id="user-menu" class="hidden items-center space-x-2 md:space-x-4 whitespace-nowrap">
                        <a id="admin-link" href="admin.html" class="nav-link text-yellow-400 text-xs md:text-sm whitespace-nowrap hidden">관리자</a>
                        <a href="mypage.html" class="nav-link text-white text-xs md:text-sm whitespace-nowrap">My Page</a>
                        <button onclick="signOut()" class="nav-link text-gray-400 text-xs md:text-sm whitespace-nowrap hidden sm:inline">Logout</button>
                    </div>
                </div>
            </div>
            
            <!-- 구분선 -->
            <div class="w-full h-px bg-white opacity-20 mb-4"></div>
            
            <!-- 데스크톱 네비게이션 -->
            <nav class="hidden md:flex justify-center items-center space-x-8 md:space-x-12 text-sm font-light">
                <a href="about.html" class="nav-link text-white">ABOUT</a>
                <a href="coming-soon.html" class="nav-link text-white">ALLROUND ORIGINAL</a>
                <a href="coming-soon.html" class="nav-link text-white">ALLROUND FIRSTEE</a>
                <a href="coming-soon.html" class="nav-link text-white">ALLROUND ARTIST</a>
                <a href="courses.html" class="nav-link text-white">강의</a>
                <a href="coming-soon.html" class="nav-link text-white">게시판</a>
            </nav>
        </div>
        
        <!-- 모바일 메뉴 (토글) -->
        <div id="mobile-menu" class="md:hidden hidden bg-black border-t border-white border-opacity-20">
            <nav class="px-4 py-6 space-y-4">
                <a href="about.html" class="block nav-link text-white text-sm py-2">ABOUT</a>
                <a href="coming-soon.html" class="block nav-link text-white text-sm py-2">ALLROUND ORIGINAL</a>
                <a href="coming-soon.html" class="block nav-link text-white text-sm py-2">ALLROUND FIRSTEE</a>
                <a href="coming-soon.html" class="block nav-link text-white text-sm py-2">ALLROUND ARTIST</a>
                <a href="courses.html" class="block nav-link text-white text-sm py-2">강의</a>
                <a href="coming-soon.html" class="block nav-link text-white text-sm py-2">게시판</a>
            </nav>
        </div>
    </header>

    <div class="h-36"></div>

    <main class="main-content">

    <!-- Hero Section -->
    <section class="py-12 md:py-20 px-4 md:px-6">
        <div class="max-w-5xl mx-auto text-center space-y-6 md:space-y-8">
            <div>
                <span class="text-xs md:text-sm font-semibold text-white">Online Courses</span>
            </div>
            <h2 class="text-3xl sm:text-4xl md:text-5xl lg:text-7xl font-bold leading-tight text-white">
                Learn at Your Own Pace
            </h2>
        </div>
    </section>

    <!-- Courses Grid -->
    <section class="py-12 md:py-20 px-4 md:px-6">
        <div class="max-w-6xl mx-auto">
            <div id="courses-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-6 lg:gap-8">
                <!-- 강의 카드들이 동적으로 로드됩니다 -->
                <div class="text-center text-gray-500 col-span-full py-12 md:py-20">
                    강의를 불러오는 중...
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="py-12 px-6">
        <div class="max-w-6xl mx-auto">
            <div class="w-full h-px bg-white opacity-20 mb-8"></div>
            <div class="flex flex-col md:flex-row justify-between items-center space-y-4 md:space-y-0">
                <img src="/logo.png" alt="ALLROUND" class="h-3 md:h-4 w-auto">
                <div class="text-sm text-gray-400">
                    © 2024 ALLROUND. All rights reserved.
                </div>
            </div>
        </div>
    </footer>

    </main>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/courses.js"></script>
    <script>
        // 강의 카드 렌더링
        function renderCourseCard(course) {
            // 시간 표시 포맷팅
            const totalMinutes = course.totalDuration || 0;
            let durationText = '';
            if (totalMinutes >= 60) {
                const hours = Math.floor(totalMinutes / 60);
                const mins = totalMinutes % 60;
                durationText = mins > 0 ? `${hours}시간 ${mins}분` : `${hours}시간`;
            } else {
                durationText = `${totalMinutes}분`;
            }
            
            // 강의 수 표시 (lessonCount 또는 lessons 배열 길이 사용)
            const lessonCount = course.lessonCount || (Array.isArray(course.lessons) ? course.lessons.length : 0);
            const lessonsText = lessonCount > 0 ? `${lessonCount}강` : '';
            
            return `
                <a href="course-detail.html?id=${course.id}" class="course-card group">
                    <div class="course-image-wrapper">
                        <img src="${course.thumbnail_url || 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800&q=80'}" 
                             alt="${course.title}" 
                             class="course-image">
                    </div>
                    <div class="space-y-1">
                        <span class="category-tag">${course.category || 'General'}</span>
                        <h3 class="course-title group-hover:text-gray-300 transition-colors">${course.title}</h3>
                        <div class="course-meta">
                            <span>${lessonsText}</span>
                            ${lessonsText && durationText ? '<span class="mx-2 opacity-30">|</span>' : ''}
                            <span>${durationText}</span>
                        </div>
                    </div>
                </a>
            `;
        }

        // 강의 목록 로드
        async function loadCourses() {
            const grid = document.getElementById('courses-grid');
            
            const result = await getAllCourses();
            
            if (result.success && result.data.length > 0) {
                grid.innerHTML = result.data.map(renderCourseCard).join('');
            } else {
                grid.innerHTML = `
                    <div class="text-center text-gray-500 col-span-full py-20">
                        <p class="text-xl mb-4">아직 등록된 강의가 없습니다.</p>
                        <p class="text-sm">곧 새로운 강의가 업로드될 예정입니다.</p>
                    </div>
                `;
            }
        }

        // 페이지 로드 시 강의 목록 불러오기
        document.addEventListener('DOMContentLoaded', loadCourses);
    </script>
    
    <!-- 모바일 메뉴 토글 스크립트 -->
    <script>
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        
        if (mobileMenuBtn && mobileMenu) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
                
                // 햄버거 메뉴 아이콘 애니메이션
                const spans = mobileMenuBtn.querySelectorAll('span');
                if (!mobileMenu.classList.contains('hidden')) {
                    spans[0].style.transform = 'rotate(45deg) translateY(6px)';
                    spans[1].style.opacity = '0';
                    spans[2].style.transform = 'rotate(-45deg) translateY(-6px)';
                } else {
                    spans[0].style.transform = 'none';
                    spans[1].style.opacity = '1';
                    spans[2].style.transform = 'none';
                }
            });
            
            // 모바일 메뉴 링크 클릭시 메뉴 닫기
            const mobileMenuLinks = mobileMenu.querySelectorAll('a');
            mobileMenuLinks.forEach(link => {
                link.addEventListener('click', () => {
                    mobileMenu.classList.add('hidden');
                    const spans = mobileMenuBtn.querySelectorAll('span');
                    spans[0].style.transform = 'none';
                    spans[1].style.opacity = '1';
                    spans[2].style.transform = 'none';
                });
            });
        }
    </script>
    <script src="js/footer.js"></script>
</body>
</html>
