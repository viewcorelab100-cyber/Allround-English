        }
    </style>

    <div class="h-36"></div>

    <main class="main-content">

    <!-- Hero Section -->

    <!-- Courses Grid -->

            </div>

    </footer>

    </main>

    <script src="js/supabase-config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/courses.js"></script>
    <script>
        // 강의 카드 렌더링
        function renderCourseCard(course) {
            // 시간 표시 포맷팅
            const totalMinutes = course.totalDuration || 0;
            let durationText = '';
            if (totalMinutes >= 60) {
                const hours = Math.floor(totalMinutes / 60);
                const mins = totalMinutes % 60;
                durationText = mins > 0 ? `${hours}시간 ${mins}분` : `${hours}시간`;
            } else {
                durationText = `${totalMinutes}분`;
            }
            
            return `
                <div class="course-card rounded-2xl overflow-hidden bg-white bg-opacity-5">
                    <div class="h-48 bg-cover bg-center" style="background-image: url('${course.thumbnail_url || 'https://images.unsplash.com/photo-1516321318423-f06f85e504b3?w=800&q=80'}'); background-color: #111;">
                    </div>
                    <div class="p-6 space-y-4">
                        <div class="flex items-center justify-between">
                            <span class="text-xs font-semibold text-gray-400">${course.category || 'General'}</span>
                            <span class="text-xs text-gray-500">${durationText}</span>
                        </div>
                        <h3 class="text-xl font-bold text-white">${course.title}</h3>
                        <p class="text-sm text-gray-400 line-clamp-2">${course.description || ''}</p>
                        <div class="flex items-center justify-between pt-4">
                            <span class="text-2xl font-bold text-white">₩${(course.price || 0).toLocaleString()}</span>
                            <a href="course-detail.html?id=${course.id}" 
                               class="btn-hover-scale px-6 py-2 bg-white text-black font-semibold rounded-lg text-sm">
                                자세히 보기
                            </a>
                        </div>
                    </div>
                </div>
            `;
        }

        // 강의 목록 로드
        async function loadCourses() {
            const grid = document.getElementById('courses-grid');
            
            const result = await getAllCourses();
            
            if (result.success && result.data.length > 0) {
                grid.innerHTML = result.data.map(renderCourseCard).join('');
            } else {
                grid.innerHTML = `
                    <div class="text-center text-gray-500 col-span-full py-20">
                        <p class="text-xl mb-4">아직 등록된 강의가 없습니다.</p>
                        <p class="text-sm">곧 새로운 강의가 업로드될 예정입니다.</p>
                    </div>
                `;
            }
        }

        // 페이지 로드 시 강의 목록 불러오기
        document.addEventListener('DOMContentLoaded', loadCourses);
    </script>
    
    <!-- 모바일 메뉴 토글 스크립트 -->
    <script>
        const mobileMenuBtn = document.getElementById('mobile-menu-btn');
        const mobileMenu = document.getElementById('mobile-menu');
        
        if (mobileMenuBtn && mobileMenu) {
            mobileMenuBtn.addEventListener('click', () => {
                mobileMenu.classList.toggle('hidden');
                
                // 햄버거 메뉴 아이콘 애니메이션
                const spans = mobileMenuBtn.querySelectorAll('span');
                if (!mobileMenu.classList.contains('hidden')) {
                    spans[0].style.transform = 'rotate(45deg) translateY(6px)';
                    spans[1].style.opacity = '0';
                    spans[2].style.transform = 'rotate(-45deg) translateY(-6px)';
                } else {
                    spans[0].style.transform = 'none';
                    spans[1].style.opacity = '1';
                    spans[2].style.transform = 'none';
                }
            });
            
            // 모바일 메뉴 링크 클릭시 메뉴 닫기
            const mobileMenuLinks = mobileMenu.querySelectorAll('a');
            mobileMenuLinks.forEach(link => {
                link.addEventListener('click', () => {
                    mobileMenu.classList.add('hidden');
                    const spans = mobileMenuBtn.querySelectorAll('span');
                    spans[0].style.transform = 'none';
                    spans[1].style.opacity = '1';
                    spans[2].style.transform = 'none';
                });
            });
        }
    </script>
</body>
