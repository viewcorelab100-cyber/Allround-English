<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>테스트 사이트 접근 - ALLROUND</title>
    <link rel="stylesheet" href="https://use.typekit.net/lii5ces.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: "aileron", sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    
    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">🔒 테스트 사이트</h1>
            <p class="text-gray-600">이 사이트는 현재 테스트 중입니다.</p>
            <p class="text-sm text-gray-500 mt-2">접근 권한이 있는 경우 비밀번호를 입력하세요.</p>
        </div>
        
        <form id="login-form" class="space-y-6">
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                    비밀번호
                </label>
                <input 
                    type="password" 
                    id="password" 
                    name="password"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-transparent"
                    placeholder="비밀번호를 입력하세요"
                    required
                    autocomplete="off">
            </div>
            
            <div id="error-message" class="hidden text-red-600 text-sm text-center p-3 bg-red-50 rounded-lg">
                비밀번호가 올바르지 않습니다.
            </div>
            
            <button 
                type="submit"
                class="w-full bg-gradient-to-r from-purple-600 to-blue-600 text-white py-3 rounded-lg font-semibold hover:from-purple-700 hover:to-blue-700 transition-all transform hover:scale-[1.02]">
                사이트 접속하기
            </button>
        </form>
        
        <div class="mt-8 pt-6 border-t border-gray-200 text-center">
            <p class="text-xs text-gray-500">
                ⚠️ 이 사이트는 개발/테스트 중입니다.<br>
                비밀번호는 관리자에게 문의하세요.
            </p>
        </div>
    </div>
    
    <script>
        // URL에서 리다이렉트 경로 가져오기
        const urlParams = new URLSearchParams(window.location.search);
        const redirectUrl = urlParams.get('redirect') || '/index.html';
        
        // 로그인 폼 처리
        document.getElementById('login-form').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const errorMessage = document.getElementById('error-message');
            
            // 간단한 비밀번호 검증 (실제로는 서버에서 해야 함)
            const correctPassword = 'AllroundView2025!'; // 테스트 배포용 비밀번호
            
            if (password === correctPassword) {
                // 세션 저장
                const session = {
                    authenticated: true,
                    timestamp: Date.now(),
                    expires: Date.now() + (24 * 60 * 60 * 1000) // 24시간
                };
                localStorage.setItem('allround_site_auth', JSON.stringify(session));
                
                // 원래 페이지로 리다이렉트
                window.location.href = redirectUrl;
            } else {
                // 에러 메시지 표시
                errorMessage.classList.remove('hidden');
                document.getElementById('password').value = '';
                document.getElementById('password').focus();
                
                // 3초 후 에러 메시지 숨김
                setTimeout(() => {
                    errorMessage.classList.add('hidden');
                }, 3000);
            }
        });
        
        // 이미 인증된 경우 자동 리다이렉트
        const sessionData = localStorage.getItem('allround_site_auth');
        if (sessionData) {
            try {
                const session = JSON.parse(sessionData);
                if (session.authenticated && session.expires > Date.now()) {
                    window.location.href = redirectUrl;
                }
            } catch (e) {
                console.error('Session error:', e);
            }
        }
    </script>
</body>
</html>
